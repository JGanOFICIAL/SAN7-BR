<title>Videos</title>
<style>
:root{
  --bg:#fff;
  --dark:#1a1a1a;
  --light:#f8f9fa;
  --accent:#e9ecef;
  --green:#32CD32;
  --shadow: 0 4px 12px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;font-family: 'Inter', system-ui, -apple-system, sans-serif}
body{background:var(--bg);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:100px}

/* CABEÇALHO (ORIGINAL E INTOCADO) */
header{position:fixed;top:0;left:0;right:0;height:64px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid #eee;z-index:10}
.logo-canto-esquerdo{height:38px;width:auto}

/* ÁREA DE VÍDEOS REFORMULADA */
.area-videos{width:100%;max-width:900px;margin:0 auto;padding:20px;}
.topo{text-align:center;margin-bottom:30px;}
.icone-topo{width:100%;max-height:180px;object-fit:cover;border-radius:12px;margin-bottom:15px; box-shadow: var(--shadow);}
h2{font-size:24px; font-weight:800; color:#111; letter-spacing:-0.5px; margin-bottom:20px}

/* BARRA DE PESQUISA */
.search-container { position: relative; margin-bottom: 30px; width: 100%; }
.search-bar {
    width: 100%;
    padding: 16px 20px 16px 50px;
    border: 2px solid #eee;
    border-radius: 12px;
    font-size: 16px;
    transition: all 0.3s ease;
    background: #f9f9f9;
    outline: none;
}
.search-bar:focus { border-color: var(--green); background: #fff; box-shadow: 0 0 0 4px rgba(50, 205, 50, 0.1); }
.search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #999; }

/* CATEGORIAS */
.grupos{ display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 30px; }
.grupo{
    padding: 12px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; color: #444; background: #fff;
    border: 1px solid #eee; border-radius: 10px; text-transform: uppercase; transition: 0.2s; min-height: 55px;
}
.grupo.active { background: var(--dark); color: #fff; border-color: var(--dark); }

/* CORES LATERAIS DOS BOTÕES */
.grupo[data-grupo="inferiores"]{ border-left: 5px solid #f54242; }
.grupo[data-grupo="costas"]{ border-left: 5px solid #4287f5; }
.grupo[data-grupo="peito"]{ border-left: 5px solid #42f56b; }
.grupo[data-grupo="bracos"]{ border-left: 5px solid #f5a142; }
.grupo[data-grupo="ombros"]{ border-left: 5px solid #b142f5; }

/* LISTAGEM */
.conteudo{ display: none; grid-template-columns: 1fr; gap: 20px; animation: fadeIn 0.4s ease; }
.item{ background:#fff; border-radius: 15px; overflow: hidden; border: 1px solid #eee; display: flex; flex-direction: column; }
.item-info { padding: 18px; }
.item h3{ margin-bottom:8px; font-size:17px; color: var(--dark); font-weight: 700;}
.video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
.video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
.item p{ font-size:14px; line-height:1.5; color:#666; }

@keyframes fadeIn{ from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }
#no-results { display: none; text-align: center; padding: 40px; color: #999; }

@media (max-width: 600px) { .grupos { grid-template-columns: 1fr 1fr; } }
</style>
</head>

          resolve(firebase);

        }

    let allData = [];

    function getYoutubeEmbedUrl(url) {
      if (!url) return '';
      url = url.trim();
      var patterns = [
        /(?:youtube\.com\/shorts\/)([^\/?]+)/,
        /(?:youtube\.com\/watch\?v=)([^&]+)/,
        /(?:youtu\.be\/)([^?]+)/,
        /(?:youtube\.com\/embed\/)([^?]+)/
      ];
      var videoId = null;
      for (var i = 0; i < patterns.length; i++) {
        var match = url.match(patterns[i]);
        if (match) {
          videoId = match[1];
          break;
        }
      }
      if (!videoId) {
        var idMatch = url.match(/([a-zA-Z0-9_-]{11})/);
        if (idMatch) videoId = idMatch[1];
      }
      if (videoId) {
        return 'https://www.youtube.com/embed/' + videoId + '?rel=0&modestbranding=1&autoplay=1&showinfo=0';
      }
      return url;
    }

    function getYoutubeThumbnail(url) {
      if (!url) return '';
      url = url.trim();
      var patterns = [
        /(?:youtube\.com\/shorts\/)([^\/?]+)/,
        /(?:youtube\.com\/watch\?v=)([^&]+)/,
        /(?:youtu\.be\/)([^?]+)/
      ];
      var videoId = null;
      for (var i = 0; i < patterns.length; i++) {
        var match = url.match(patterns[i]);
        if (match) {
          videoId = match[1];
          break;
        }
      }
      if (!videoId) {
        var idMatch = url.match(/([a-zA-Z0-9_-]{11})/);
        if (idMatch) videoId = idMatch[1];
      }
      if (videoId) {
        return 'https://img.youtube.com/vi/' + videoId + '/mqdefault.jpg';
      }
      return '';
    }

      if (searchTerm) {
        filteredGroups = data.filter(function(group) {
          var groupMatch = group.name.toLowerCase().includes(searchTerm);
          var exercisesMatch = group.exercises.some(function(ex) {
            return ex.title.toLowerCase().includes(searchTerm) || 
              (ex.description && ex.description.toLowerCase().includes(searchTerm));
          });
          return groupMatch || exercisesMatch;
        }).map(function(group) {
          return {
            name: group.name,
            exercises: group.exercises.filter(function(ex) {
              return ex.title.toLowerCase().includes(searchTerm) || 
                (ex.description && ex.description.toLowerCase().includes(searchTerm));
            })
          };
        }).filter(function(g) {
          return g.exercises.length > 0;
        });
      }

      if (!filteredGroups || filteredGroups.length === 0) {
        container.innerHTML = '<div class="sw-no-results">' + 
          (searchTerm ? 'Nenhum resultado para "' + searchTerm + '"' : 'Nenhum treino cadastrado') + 
          '</div>';
        return;
      }

      var html = '';
      filteredGroups.forEach(function(group, idx) {
        var groupId = 'sw-group-' + idx + '-' + Date.now();
        var exCount = group.exercises.length;
        var colorIndex = idx % 10;
        
        html += '<div class="sw-muscle-group sw-color-' + colorIndex + '">';
        html += '<div class="sw-group-header" onclick="window.toggleGroup(\'' + groupId + '\')">';
        html += '<h3>' + escapeHtml(group.name) + '<span class="sw-badge">' + exCount + '</span></h3>';
        html += '<span class="sw-arrow" id="' + groupId + '-arrow">▼</span>';
        html += '</div>';
        html += '<div class="sw-exercises" id="' + groupId + '">';
        
        group.exercises.forEach(function(ex, exIdx) {
          var embedUrl = getYoutubeEmbedUrl(ex.videoUrl);
          var thumbnailUrl = getYoutubeThumbnail(ex.videoUrl);
          var exId = 'sw-ex-' + groupId + '-' + exIdx;
          
          html += '<div class="sw-exercise-item">';
          html += '<div class="sw-exercise-info">';
          html += '<h4>' + escapeHtml(ex.title) + '</h4>';
          if (ex.description) {
            html += '<p>' + escapeHtml(ex.description) + '</p>';
          }
          html += '</div>';
          
          if (embedUrl) {
            html += '<div class="sw-video-wrapper" id="' + exId + '-wrapper" onclick="window.openModal(\'' + embedUrl.replace(/'/g, "\\'") + '\', \'' + escapeHtml(ex.title).replace(/'/g, "\\'") + '\')">';
            if (thumbnailUrl) {
              html += '<img class="sw-thumbnail" id="' + exId + '-thumb" src="' + thumbnailUrl + '" alt="' + escapeHtml(ex.title) + '">';
            }
            html += '<div class="sw-banner" id="' + exId + '-banner">';
            html += '<div class="sw-play-icon">▶</div>';
            html += '<div class="sw-banner-text">Assistir</div>';
            html += '</div>';
            html += '<iframe id="' + exId + '" src="' + embedUrl + '" allowfullscreen loading="lazy" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>';
            html += '</div>';
          } else {
            html += '<div class="sw-video-wrapper"><div class="sw-video-placeholder">Video indisponivel</div></div>';
          }
          
          html += '</div>';
        });
        
        html += '</div></div>';
      });

      container.innerHTML = html;
    }

    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    window.toggleGroup = function(id) {
      var el = document.getElementById(id);
      var arrow = document.getElementById(id + '-arrow');
      if (el) {
        el.classList.toggle('open');
        if (arrow) arrow.classList.toggle('open');
      }
    };

    window.openModal = function(videoUrl, title) {
      var modal = document.getElementById('sw-modal');
      var iframe = document.getElementById('sw-modal-iframe');
      if (modal && iframe) {
        iframe.src = videoUrl;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
    };

    window.closeModal = function() {
      var modal = document.getElementById('sw-modal');
      var iframe = document.getElementById('sw-modal-iframe');
      if (modal) {
        modal.classList.remove('active');
        document.body.style.overflow = '';
        if (iframe) {
          iframe.src = '';
        }
      }
    };

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        window.closeModal();
      }
    });

    document.getElementById('sw-modal').addEventListener('click', function(e) {
      if (e.target === this) {
        window.closeModal();
      }
    });

    function loadData() {
      var container = document.getElementById('sw-content');
      if (container) {
        container.innerHTML = '<div class="sw-loading">Carregando treinos</div>';
      }

      loadFirebase()
        .then(function(fb) {
          var db = fb.database();
          var ref = db.ref('muscleGroups');
          ref.on('value', function(snapshot) {
            var data = snapshot.val();
            if (data) {
              allData = Object.keys(data).map(function(key) {
                var exercises = data[key].exercises ? 
                  Object.keys(data[key].exercises).map(function(exKey) {
                    return {
                      id: exKey,
                      title: data[key].exercises[exKey].title || 'Sem titulo',
                      description: data[key].exercises[exKey].description || '',
                      videoUrl: data[key].exercises[exKey].videoUrl || ''
                    };
                  }) : [];
                return {
                  id: key,
                  name: data[key].name || 'Sem nome',
                  exercises: exercises
                };
              });
              renderWidget(allData);
            } else {
              allData = [];
              container.innerHTML = '<div class="sw-no-results">Nenhum grupo muscular cadastrado</div>';
            }
          }, function(error) {
            console.error('Erro Firebase:', error);
            container.innerHTML = '<div class="sw-no-results">Erro ao carregar dados</div>';
          });
        })
        .catch(function(err) {
          console.error('Erro ao inicializar Firebase:', err);
          container.innerHTML = '<div class="sw-no-results">Erro de conexao com o servidor</div>';
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
      var searchInput = document.getElementById('sw-search-input');
      if (searchInput) {
        searchInput.addEventListener('input', function() {
          currentFilter = this.value;
          if (allData.length) {
            renderWidget(allData);
          }
        });
        
        searchInput.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            this.value = '';
            currentFilter = '';
            if (allData.length) renderWidget(allData);
          }
        });
      }
      loadData();
    });

  })();
</script>
