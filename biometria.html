<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Cadastro Biométrico - Academia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        :root {
            --brand-green: #8DC63F;
            --brand-green-hover: #7db135;
            --dark: #111;
            --text-gray: #666;
            --border-color: #f0f0f0;
            --overlay-bg: rgba(0, 0, 0, 0.85);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://c2a6771173.cbaul-cdnwnd.com/4f0c8b93cda84ae8665e2b589652cf30/200000013-2fae32fae5/700/3C689C7F-7879-42BA-9736-D2E498D707CE.webp?ph=c2a6771173') no-repeat center center/cover;
            background-attachment: fixed;
        }

        /* Header Fixo */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .logo-canto-esquerdo {
            height: 32px;
            width: auto;
        }

        .btn-suporte {
            background: var(--brand-green);
            color: #fff;
            border: none;
            width: 85px;
            height: 35px;
            font-weight: 800;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Container Principal */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 90px 20px 40px;
        }

        /* Card de Informações do Usuário */
        .user-card {
            background: #fff;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 0;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
            color: var(--brand-green);
            border: 2px solid var(--brand-green);
        }

        .user-info h2 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .user-info p {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 3px;
        }

        .plan-badge {
            display: inline-block;
            padding: 8px 15px;
            background: #f8f8f8;
            border-left: 4px solid var(--brand-green);
            font-weight: 700;
            font-size: 14px;
            margin-top: 10px;
        }

        .plan-expired {
            border-left-color: #ff4444;
            color: #ff4444;
        }

        .plan-ok {
            border-left-color: var(--brand-green);
            color: var(--brand-green);
        }

        /* Grid de Informações */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .info-field {
            background: #f9f9f9;
            padding: 15px;
        }

        .info-field label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            color: #999;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-field input {
            width: 100%;
            padding: 10px 0;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        .info-field input:focus {
            outline: none;
            border-bottom-color: var(--brand-green);
        }

        .info-field input[readonly] {
            color: #333;
            font-weight: 700;
            border-bottom-color: transparent;
        }

        /* Botão de Biometria */
        .biometria-btn {
            width: 100%;
            padding: 25px;
            background: #000;
            color: #fff;
            border: none;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            position: relative;
            overflow: hidden;
        }

        .biometria-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .biometria-btn:hover::before {
            left: 100%;
        }

        .biometria-btn:hover {
            background: var(--brand-green);
        }

        .biometria-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Lista de Biometrias */
        .biometria-list {
            background: #fff;
            padding: 30px;
        }

        .biometria-list h3 {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .biometria-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px;
            background: #f9f9f9;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .biometria-item:hover {
            border-color: var(--brand-green);
            transform: translateX(5px);
        }

        .biometria-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            background: #ddd;
        }

        .biometria-info {
            flex: 1;
        }

        .biometria-info strong {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .biometria-info small {
            color: #999;
            font-size: 11px;
        }

        .biometria-actions {
            display: flex;
            gap: 10px;
        }

        .btn-delete {
            background: #ff4444;
            color: #fff;
            border: none;
            width: 35px;
            height: 35px;
            font-weight: 900;
            cursor: pointer;
        }

        /* Modal da Câmera */
        #cameraModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-content-camera {
            width: 90%;
            max-width: 700px;
            background: #fff;
            position: relative;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            background: #000;
            color: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .modal-close {
            font-size: 30px;
            cursor: pointer;
            line-height: 1;
        }

        .camera-container {
            position: relative;
            background: #000;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cameraFeed {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }

        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .face-guide {
            width: 250px;
            height: 250px;
            border: 3px solid rgba(141, 198, 63, 0.8);
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
        }

        .modal-footer {
            padding: 20px;
            background: #fff;
            display: flex;
            justify-content: center;
        }

        .btn-scan {
            background: var(--brand-green);
            color: #fff;
            border: none;
            padding: 18px 50px;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .btn-scan:hover {
            background: var(--brand-green-hover);
            transform: scale(1.05);
        }

        .btn-scan:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--brand-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            font-weight: 900;
            text-transform: uppercase;
            color: #333;
            letter-spacing: 2px;
        }

        .blur-effect {
            filter: blur(8px);
            transition: filter 0.3s;
        }

        /* Notificações */
        #notification-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
        }

        .notification {
            background: #fff;
            color: #000;
            padding: 16px 28px;
            border-right: 6px solid var(--brand-green);
            box-shadow: -15px 15px 40px rgba(0,0,0,0.12);
            margin-bottom: 12px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            transform: translateX(130%);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .notification.show { transform: translateX(0); }
        .notification.exit { transform: translateX(150%); }
        .notification.error { border-right-color: #ff4444; }

        /* Botões de Ação */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        .btn-save {
            flex: 1;
            padding: 18px;
            background: var(--brand-green);
            color: #fff;
            border: none;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save:hover {
            background: var(--brand-green-hover);
        }

        .btn-cancel {
            flex: 1;
            padding: 18px;
            background: #333;
            color: #fff;
            border: none;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-cancel:hover {
            background: #444;
        }

        .footer-img {
            display: block;
            margin: 30px auto 0;
            height: 18px;
            opacity: 0.4;
            filter: grayscale(1);
        }
    </style>
</head>
<body>

<div id="notification-container"></div>

<header>
    <img src="https://c2a6771173.cbaul-cdnwnd.com/4f0c8b93cda84ae8665e2b589652cf30/200000005-62d7c62d7e/700/9A9000A9-FCA5-4306-876F-28C2D3211763.webp" class="logo-canto-esquerdo">
    <button class="btn-suporte" onclick="window.location.href='chat.html'">Suporte</button>
</header>

<div class="container">
    <div class="user-card" id="userCard">
        <div class="user-header">
            <div class="user-avatar" id="userAvatar">?</div>
            <div class="user-info">
                <h2 id="userName">Carregando...</h2>
                <p id="userNA">NA: ---</p>
                <p id="userPhone">Telefone: ---</p>
            </div>
        </div>
        
        <div class="plan-badge" id="planStatus">Verificando plano...</div>
        
        <div class="info-grid">
            <div class="info-field">
                <label>Nome Completo</label>
                <input type="text" id="fullName" readonly>
            </div>
            <div class="info-field">
                <label>Telefone</label>
                <input type="text" id="phone" placeholder="(00) 00000-0000">
            </div>
            <div class="info-field">
                <label>Endereço</label>
                <input type="text" id="address" placeholder="Seu endereço (opcional)">
            </div>
            <div class="info-field">
                <label>Data de Nascimento</label>
                <input type="text" id="birthDate" readonly>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn-save" onclick="saveComplementaryInfo()">Salvar Alterações</button>
            <button class="btn-cancel" onclick="logout()">Sair</button>
        </div>
    </div>

    <button class="biometria-btn" id="biometriaBtn" onclick="openCamera()">
        <span>⚡</span> Gerenciar Biometria Facial <span>⚡</span>
    </button>

    <div class="biometria-list" id="biometriaList">
        <h3>Biometrias Cadastradas</h3>
        <div id="biometriaItems"></div>
        <p id="noBiometria" style="color: #999; text-align: center; padding: 20px;">Nenhuma biometria cadastrada</p>
    </div>
    
    <img src="https://c2a6771173.cbaul-cdnwnd.com/4f0c8b93cda84ae8665e2b589652cf30/200000031-a3714a3716/700/86575BA3-ED3D-4EE7-A61F-F460FF284429.webp" class="footer-img">
</div>

<!-- Modal da Câmera -->
<div id="cameraModal">
    <div class="modal-content-camera">
        <div class="modal-header">
            <h3>DOMUSFIT • CADASTRO FACIAL</h3>
            <span class="modal-close" onclick="closeCamera()">&times;</span>
        </div>
        
        <div class="camera-container">
            <video id="cameraFeed" autoplay playsinline></video>
            <div class="camera-overlay">
                <div class="face-guide"></div>
            </div>
            
            <div class="loading-overlay" id="cameraLoading">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">PROCESSANDO...</div>
            </div>
        </div>
        
        <div class="modal-footer">
            <button class="btn-scan" id="scanBtn" onclick="captureAndUpload()">ESCANEAR</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.0.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@0.0.2/dist/face-landmarks-detection.min.js"></script>

<script>
// Configuração Firebase
const firebaseConfig = {
    apiKey: "AIzaSyBPiznHCVkTAgx6m02bZB8b0FFaot9UkBU",
    authDomain: "prefeitura-de-joao-camara.firebaseapp.com",
    projectId: "prefeitura-de-joao-camara",
    storageBucket: "prefeitura-de-joao-camara.firebasestorage.app",
    messagingSenderId: "269299041577",
    appId: "1:269299041577:web:fd41b2939240e9eb476338",
    measurementId: "G-YT7NHR342J"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Configuração Cloudinary
const CLOUD_NAME = "dzmjto17f";
const UPLOAD_PRESET = "ml_default";
const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

// Variáveis Globais
let currentUser = null;
let cameraStream = null;
let faceModel = null;
let isProcessing = false;

// Verificar login
const loggedUser = localStorage.getItem('loggedUser');
if (!loggedUser) {
    window.location.href = 'login.html';
}

// Carregar modelo de detecção facial
async function loadFaceModel() {
    try {
        faceModel = await faceLandmarksDetection.load(
            faceLandmarksDetection.SupportedPackages.mediapipeFacemesh,
            { maxFaces: 1 }
        );
        console.log('Modelo facial carregado');
    } catch (error) {
        console.error('Erro ao carregar modelo:', error);
    }
}
loadFaceModel();

// Notificações
function showNotification(msg, isError = false) {
    const container = document.getElementById('notification-container');
    const el = document.createElement('div');
    el.className = `notification ${isError ? 'error' : ''}`;
    el.innerText = msg;
    container.appendChild(el);
    setTimeout(() => el.classList.add('show'), 50);
    setTimeout(() => {
        el.classList.add('exit');
        setTimeout(() => el.remove(), 600);
    }, 3500);
}

// Carregar dados do usuário
async function loadUserData() {
    try {
        const snap = await db.ref('users/' + loggedUser).get();
        if (!snap.exists()) {
            showNotification('Usuário não encontrado', true);
            setTimeout(logout, 2000);
            return;
        }
        
        currentUser = snap.val();
        
        // Atualizar UI
        document.getElementById('userName').textContent = currentUser.name || 'Usuário';
        document.getElementById('userNA').textContent = `NA: ${loggedUser}`;
        document.getElementById('userPhone').textContent = `Telefone: ${currentUser.phone || '---'}`;
        document.getElementById('fullName').value = currentUser.name || '';
        document.getElementById('phone').value = currentUser.phone || '';
        document.getElementById('address').value = currentUser.address || '';
        document.getElementById('birthDate').value = currentUser.birthDate || '---';
        
        // Avatar com inicial
        document.getElementById('userAvatar').textContent = (currentUser.name || '?').charAt(0).toUpperCase();
        
        // Status do plano
        const today = new Date().toISOString().slice(0,10);
        const planStatus = document.getElementById('planStatus');
        if (currentUser.endDate && currentUser.endDate < today) {
            planStatus.textContent = '⚠️ PLANO VENCIDO - Renove para usar a biometria';
            planStatus.classList.add('plan-expired');
        } else {
            planStatus.textContent = `✅ PLANO ATIVO • Válido até: ${currentUser.endDate || 'Sem data'}`;
            planStatus.classList.add('plan-ok');
        }
        
        // Carregar biometrias
        loadBiometrias();
        
    } catch (error) {
        console.error('Erro ao carregar usuário:', error);
        showNotification('Erro ao carregar dados', true);
    }
}

// Carregar lista de biometrias
async function loadBiometrias() {
    try {
        const snap = await db.ref(`biometrias/${loggedUser}`).get();
        const biometrias = snap.val() || {};
        const container = document.getElementById('biometriaItems');
        const noBiometria = document.getElementById('noBiometria');
        
        container.innerHTML = '';
        
        const biometriaArray = Object.entries(biometrias);
        
        if (biometriaArray.length === 0) {
            noBiometria.style.display = 'block';
            return;
        }
        
        noBiometria.style.display = 'none';
        
        biometriaArray.forEach(([key, value]) => {
            const date = new Date(value.timestamp || Date.now()).toLocaleString('pt-BR');
            const item = document.createElement('div');
            item.className = 'biometria-item';
            item.innerHTML = `
                <img src="${value.imageUrl || 'https://via.placeholder.com/60'}" alt="Biometria">
                <div class="biometria-info">
                    <strong>Biometria ${key.slice(-4)}</strong>
                    <small>Cadastrada em: ${date}</small>
                </div>
                <div class="biometria-actions">
                    <button class="btn-delete" onclick="deleteBiometria('${key}')">✕</button>
                </div>
            `;
            container.appendChild(item);
        });
        
    } catch (error) {
        console.error('Erro ao carregar biometrias:', error);
    }
}

// Salvar informações complementares
async function saveComplementaryInfo() {
    const updates = {
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value
    };
    
    try {
        await db.ref('users/' + loggedUser).update(updates);
        showNotification('Informações salvas com sucesso!');
        
        // Atualizar dados locais
        if (currentUser) {
            currentUser.phone = updates.phone;
            currentUser.address = updates.address;
        }
    } catch (error) {
        console.error('Erro ao salvar:', error);
        showNotification('Erro ao salvar informações', true);
    }
}

// Abrir câmera
async function openCamera() {
    const modal = document.getElementById('cameraModal');
    modal.style.display = 'flex';
    
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: { ideal: 1280 },
                height: { ideal: 720 },
                facingMode: 'user'
            } 
        });
        
        const video = document.getElementById('cameraFeed');
        video.srcObject = cameraStream;
        
        // Habilitar botão de scan
        document.getElementById('scanBtn').disabled = false;
        
    } catch (error) {
        console.error('Erro ao abrir câmera:', error);
        showNotification('Erro ao acessar câmera', true);
        closeCamera();
    }
}

// Fechar câmera
function closeCamera() {
    if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
    }
    
    document.getElementById('cameraModal').style.display = 'none';
    document.getElementById('cameraLoading').style.display = 'none';
    document.getElementById('cameraFeed').classList.remove('blur-effect');
    isProcessing = false;
}

// Capturar e enviar foto
async function captureAndUpload() {
    if (isProcessing) return;
    
    const video = document.getElementById('cameraFeed');
    const scanBtn = document.getElementById('scanBtn');
    const loading = document.getElementById('cameraLoading');
    const loadingText = document.getElementById('loadingText');
    
    // Verificar se há rosto
    if (faceModel) {
        try {
            const faces = await faceModel.estimateFaces({
                input: video,
                returnTensors: false,
                flipHorizontal: false,
                predictIrises: true
            });
            
            if (faces.length === 0) {
                showNotification('Nenhum rosto detectado!', true);
                return;
            }
        } catch (error) {
            console.error('Erro na detecção facial:', error);
        }
    }
    
    isProcessing = true;
    scanBtn.disabled = true;
    video.classList.add('blur-effect');
    loading.style.display = 'flex';
    
    // Criar canvas para capturar a imagem
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // Converter para blob
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
    
    // Criar FormData para upload
    const formData = new FormData();
    formData.append('file', blob);
    formData.append('upload_preset', UPLOAD_PRESET);
    
    loadingText.textContent = 'ENVIANDO PARA CLOUDINARY...';
    
    try {
        // Upload para Cloudinary
        const uploadResponse = await fetch(CLOUDINARY_URL, {
            method: 'POST',
            body: formData
        });
        
        const uploadData = await uploadResponse.json();
        
        if (!uploadData.secure_url) {
            throw new Error('Falha no upload');
        }
        
        loadingText.textContent = 'SALVANDO NO BANCO...';
        
        // Salvar no Firebase
        const biometriaKey = db.ref(`biometrias/${loggedUser}`).push().key;
        const biometriaData = {
            imageUrl: uploadData.secure_url,
            timestamp: Date.now(),
            publicId: uploadData.public_id,
            version: uploadData.version
        };
        
        await db.ref(`biometrias/${loggedUser}/${biometriaKey}`).set(biometriaData);
        
        showNotification('Biometria cadastrada com sucesso!');
        loadBiometrias();
        closeCamera();
        
    } catch (error) {
        console.error('Erro no upload:', error);
        showNotification('Erro ao cadastrar biometria', true);
        video.classList.remove('blur-effect');
        loading.style.display = 'none';
        scanBtn.disabled = false;
        isProcessing = false;
    }
}

// Deletar biometria
async function deleteBiometria(key) {
    if (!confirm('Remover esta biometria?')) return;
    
    try {
        await db.ref(`biometrias/${loggedUser}/${key}`).remove();
        showNotification('Biometria removida');
        loadBiometrias();
    } catch (error) {
        console.error('Erro ao deletar:', error);
        showNotification('Erro ao remover biometria', true);
    }
}

// Logout
function logout() {
    localStorage.removeItem('loggedUser');
    window.location.href = 'login.html';
}

// Inicializar
loadUserData();

// Salvar NA no localStorage para uso na catraca (se quiser manter logado)
if (loggedUser && localStorage.getItem('save_active') === 'true') {
    localStorage.setItem('saved_na', loggedUser);
}
</script>
