<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Cadastro Biométrico - DomusFit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        :root {
            --brand-green: #8DC63F;
            --brand-green-hover: #7db135;
            --dark: #000000;
            --text-gray: #666;
            --border-color: #f0f0f0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.2)), url("https://c2a6771173.cbaul-cdnwnd.com/4f0c8b93cda84ae8665e2b589652cf30/200000013-2fae32fae5/700/3C689C7F-7879-42BA-9736-D2E498D707CE.webp?ph=c2a6771173") no-repeat center center/cover;
            background-attachment: fixed;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px; /* Um pouco mais fino */
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-bottom: 1px solid #eee;
            z-index: 100;
        }

        .logo-canto-esquerdo {
            height: 30px; /* Ajustado */
            width: auto;
        }

        .btn-suporte {
            background: var(--brand-green);
            color: #fff;
            border: none;
            width: 80px;
            height: 32px;
            font-weight: 800;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        main {
            max-width: 500px;
            margin: 80px auto 30px; /* Ajustado */
            padding: 20px;
        }

        .card {
            background: #fff;
            padding: 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15);
            animation: entrance 0.7s ease-out;
        }

        @keyframes entrance {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 22px;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .user-info {
            background: #f9f9f9;
            padding: 20px;
            border-left: 4px solid var(--brand-green);
            margin-bottom: 25px;
        }

        .user-info p {
            margin: 8px 0;
            font-size: 14px;
            color: #333;
        }

        .user-info strong {
            color: #000;
            font-weight: 800;
        }

        .info-complementar {
            margin-bottom: 25px;
        }

        .info-complementar label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            color: #999;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .info-complementar input {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            background: #fcfcfc;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
        }

        .info-complementar input:focus {
            border-color: var(--brand-green);
            background: #fff;
        }

        .btn-biometria {
            width: 100%;
            padding: 20px;
            border: none;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            background: var(--brand-green);
            color: #fff;
            margin: 10px 0;
        }

        .btn-biometria:hover {
            background: var(--brand-green-hover);
        }

        .biometria-status {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f9f9f9;
            margin-top: 20px;
        }

        .biometria-status img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--brand-green);
        }

        .biometria-status span {
            font-size: 13px;
            color: #444;
        }

        /* Modal da Câmera - Tela Cheia */
        #cameraModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .modal-header {
            background: var(--brand-green);
            color: #fff;
            padding: 12px 25px; /* Mais fino */
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .modal-close {
            font-size: 32px;
            cursor: pointer;
            line-height: 1;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.2);
        }

        #videoContainer {
            position: relative;
            flex: 1;
            width: 100%;
            background: #000;
            overflow: hidden;
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s;
        }

        #videoElement.frozen {
            filter: blur(8px);
        }

        #canvasOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .status-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 12px 30px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-left: 4px solid var(--brand-green);
            display: none;
            z-index: 200;
        }

        .status-overlay.processing {
            display: block;
            background: rgba(0,0,0,0.9);
            border-left-color: #ffaa00;
        }

        .status-overlay.success {
            display: block;
            background: rgba(0,0,0,0.9);
            border-left-color: var(--brand-green);
        }

        .status-overlay.error {
            display: block;
            background: rgba(0,0,0,0.9);
            border-left-color: #ff4444;
        }

        #notification-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 2000;
        }

        .alert {
            background: #fff;
            color: #000;
            padding: 16px 28px;
            border-right: 6px solid var(--brand-green);
            box-shadow: -15px 15px 40px rgba(0,0,0,0.12);
            margin-bottom: 12px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            transform: translateX(130%);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .alert.show { transform: translateX(0); }
        .alert.error { border-right-color: #ff4444; }
    </style>
</head>
<body>

<div id="notification-container"></div>

<header>
    <img src="https://c2a6771173.cbaul-cdnwnd.com/4f0c8b93cda84ae8665e2b589652cf30/200000005-62d7c62d7e/700/9A9000A9-FCA5-4306-876F-28C2D3211763.webp" class="logo-canto-esquerdo">
    <button class="btn-suporte" onclick="window.location.href='chat.html'">Suporte</button>
</header>

<main>
    <div class="card">
        <h2>Cadastro Biométrico</h2>
        
        <div id="userInfo" class="user-info">
            <p><strong>NA:</strong> <span id="naDisplay">Carregando...</span></p>
            <p><strong>Nome:</strong> <span id="nameDisplay">Carregando...</span></p>
            <p><strong>Plano:</strong> <span id="planDisplay">Carregando...</span></p>
            <p><strong>Vencimento:</strong> <span id="expiryDisplay">Carregando...</span></p>
        </div>

        <div class="info-complementar">
            <label>Telefone (opcional)</label>
            <input type="text" id="phoneInput" placeholder="(00) 00000-0000">
            
            <label>Endereço (opcional)</label>
            <input type="text" id="addressInput" placeholder="Rua, número, bairro">
            
            <button class="btn-biometria" id="saveInfoBtn">Salvar Informações</button>
        </div>

        <div id="biometriaSection">
            <button class="btn-biometria" id="cadastrarBiometriaBtn">
                Cadastrar Biometria Facial
            </button>
            
            <div id="biometriaStatus" class="biometria-status" style="display: none;">
                <img id="biometriaFoto" src="" alt="Foto">
                <span>Biometria cadastrada em: <span id="biometriaData"></span></span>
            </div>
            
            <button class="btn-biometria" id="removerBiometriaBtn" style="background:#ff4444; display: none;">
                Remover Biometria
            </button>
        </div>
    </div>
</main>

<!-- Modal da Câmera - Tela Cheia -->
<div id="cameraModal">
    <div class="modal-header">
        <h3>DomusFit - Captura Biométrica</h3>
        <span class="modal-close" onclick="fecharCamera()">&times;</span>
    </div>
    
    <div id="videoContainer">
        <video id="videoElement" autoplay playsinline></video>
        <canvas id="canvasOverlay"></canvas>
        
        <div class="status-overlay" id="statusOverlay">
            AGUARDANDO ROSTO...
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script>
// Configurações
const CLOUD_NAME = "dzmjto17f";
const UPLOAD_PRESET = "ml_default";
const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

// Firebase
const firebaseConfig = {
    apiKey: "AIzaSyBPiznHCVkTAgx6m02bZB8b0FFaot9UkBU",
    authDomain: "prefeitura-de-joao-camara.firebaseapp.com",
    projectId: "prefeitura-de-joao-camara",
    storageBucket: "prefeitura-de-joao-camara.firebasestorage.app",
    messagingSenderId: "269299041577",
    appId: "1:269299041577:web:fd41b2939240e9eb476338",
    measurementId: "G-YT7NHR342J"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Variáveis globais
let currentUser = null;
let videoStream = null;
let isProcessing = false;
let detectionInterval = null;

// Verificar login
const loggedUser = localStorage.getItem('loggedUser');
if (!loggedUser) {
    window.location.href = 'login.html';
}

// Carregar dados do usuário
async function carregarDadosUsuario() {
    try {
        const snap = await db.ref('users/' + loggedUser).get();
        if (!snap.exists()) {
            showNotification('Usuário não encontrado', 'error');
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            return;
        }
        
        currentUser = snap.val();
        
        // Preencher informações
        document.getElementById('naDisplay').textContent = loggedUser;
        document.getElementById('nameDisplay').textContent = currentUser.name || 'Não informado';
        document.getElementById('planDisplay').textContent = currentUser.planName || 'Padrão';
        document.getElementById('expiryDisplay').textContent = currentUser.endDate || 'Sem data';
        
        if (currentUser.phone) document.getElementById('phoneInput').value = currentUser.phone;
        if (currentUser.address) document.getElementById('addressInput').value = currentUser.address;
        
        // Verificar biometria existente
        if (currentUser.biometria) {
            document.getElementById('biometriaStatus').style.display = 'flex';
            document.getElementById('biometriaFoto').src = currentUser.biometria.foto;
            document.getElementById('biometriaData').textContent = new Date(currentUser.biometria.data).toLocaleString();
            document.getElementById('removerBiometriaBtn').style.display = 'block';
            document.getElementById('cadastrarBiometriaBtn').textContent = 'Atualizar Biometria';
        }
        
    } catch (error) {
        showNotification('Erro ao carregar dados', 'error');
    }
}

// Salvar informações complementares
document.getElementById('saveInfoBtn').addEventListener('click', async () => {
    const phone = document.getElementById('phoneInput').value;
    const address = document.getElementById('addressInput').value;
    
    try {
        await db.ref('users/' + loggedUser).update({
            phone: phone,
            address: address
        });
        showNotification('Informações salvas com sucesso!');
    } catch (error) {
        showNotification('Erro ao salvar informações', 'error');
    }
});

// Iniciar captura automática de biometria
document.getElementById('cadastrarBiometriaBtn').addEventListener('click', async () => {
    try {
        await carregarModelosFace();
        document.getElementById('cameraModal').style.display = 'flex';
        await iniciarCamera();
        iniciarDeteccaoAutomatica();
    } catch (error) {
        showNotification('Erro ao iniciar câmera', 'error');
    }
});

// Carregar modelos FaceAPI
async function carregarModelosFace() {
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    
    await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    ]);
}

// Iniciar câmera
async function iniciarCamera() {
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: 1280, 
                height: 720,
                facingMode: 'user'
            } 
        });
        
        const video = document.getElementById('videoElement');
        video.srcObject = videoStream;
        
    } catch (error) {
        showNotification('Erro ao acessar câmera', 'error');
    }
}

// Iniciar detecção automática
function iniciarDeteccaoAutomatica() {
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasOverlay');
    const ctx = canvas.getContext('2d');
    const statusOverlay = document.getElementById('statusOverlay');
    
    let stableFrames = 0;
    const STABLE_THRESHOLD = 10;
    
    detectionInterval = setInterval(async () => {
        if (!video.videoWidth || isProcessing) return;
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        try {
            const options = new faceapi.TinyFaceDetectorOptions({ 
                inputSize: 320,
                scoreThreshold: 0.5
            });
            
            const detections = await faceapi.detectAllFaces(video, options)
                .withFaceLandmarks();
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (detections.length === 1) {
                faceapi.draw.drawFaceLandmarks(canvas, detections.map(d => d.landmarks));
                
                stableFrames++;
                statusOverlay.textContent = `CAPTURANDO... ${Math.min(100, Math.round((stableFrames / STABLE_THRESHOLD) * 100))}%`;
                statusOverlay.className = 'status-overlay processing';
                
                if (stableFrames >= STABLE_THRESHOLD && !isProcessing) {
                    await capturarFaceComFreeze();
                }
            } else if (detections.length === 0) {
                stableFrames = 0;
                statusOverlay.textContent = 'AGUARDANDO ROSTO...';
                statusOverlay.className = 'status-overlay';
            } else {
                stableFrames = 0;
                statusOverlay.textContent = 'MÚLTIPLOS ROSTOS';
                statusOverlay.className = 'status-overlay error';
            }
            
        } catch (error) {
            console.error('Erro na detecção:', error);
        }
    }, 100);
}

// Capturar face com freeze da imagem
async function capturarFaceComFreeze() {
    if (isProcessing) return;
    
    isProcessing = true;
    const video = document.getElementById('videoElement');
    const statusOverlay = document.getElementById('statusOverlay');
    
    // Congelar e borrar o vídeo
    video.classList.add('frozen');
    statusOverlay.textContent = 'PROCESSANDO...';
    
    try {
        // Capturar frame atual
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const imageData = canvas.toDataURL('image/jpeg', 0.9);
        
        // Detectar face com descritor
        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptors();
        
        if (detections.length === 0) {
            throw new Error('Nenhum rosto detectado');
        }
        
        if (detections.length > 1) {
            throw new Error('Múltiplos rostos');
        }
        
        const descriptor = Array.from(detections[0].descriptor);
        
        // Upload Cloudinary
        const formData = new FormData();
        formData.append('file', imageData);
        formData.append('upload_preset', UPLOAD_PRESET);
        
        const uploadResponse = await fetch(CLOUDINARY_URL, {
            method: 'POST',
            body: formData
        });
        
        const uploadResult = await uploadResponse.json();
        
        // Salvar no Firebase
        const biometriaData = {
            foto: uploadResult.secure_url,
            public_id: uploadResult.public_id,
            descriptor: descriptor,
            data: new Date().toISOString()
        };
        
        await db.ref('users/' + loggedUser + '/biometria').set(biometriaData);
        
        // Sucesso
        statusOverlay.textContent = 'CADASTRADO COM SUCESSO!';
        statusOverlay.className = 'status-overlay success';
        
        document.getElementById('biometriaStatus').style.display = 'flex';
        document.getElementById('biometriaFoto').src = uploadResult.secure_url;
        document.getElementById('biometriaData').textContent = new Date().toLocaleString();
        document.getElementById('removerBiometriaBtn').style.display = 'block';
        document.getElementById('cadastrarBiometriaBtn').textContent = 'Atualizar Biometria';
        
        showNotification('Biometria cadastrada!');
        
        setTimeout(fecharCamera, 2000);
        
    } catch (error) {
        statusOverlay.textContent = error.message || 'ERRO';
        statusOverlay.className = 'status-overlay error';
        video.classList.remove('frozen');
        isProcessing = false;
    }
}

// Remover biometria
document.getElementById('removerBiometriaBtn').addEventListener('click', async () => {
    if (confirm('Remover biometria?')) {
        try {
            await db.ref('users/' + loggedUser + '/biometria').remove();
            
            document.getElementById('biometriaStatus').style.display = 'none';
            document.getElementById('removerBiometriaBtn').style.display = 'none';
            document.getElementById('cadastrarBiometriaBtn').textContent = 'Cadastrar Biometria';
            
            showNotification('Biometria removida!');
        } catch (error) {
            showNotification('Erro ao remover', 'error');
        }
    }
});

// Fechar câmera
function fecharCamera() {
    if (detectionInterval) {
        clearInterval(detectionInterval);
        detectionInterval = null;
    }
    
    if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
    }
    
    document.getElementById('cameraModal').style.display = 'none';
    document.getElementById('videoElement').classList.remove('frozen');
    isProcessing = false;
}

// Notificações
function showNotification(msg, type = 'success') {
    const container = document.getElementById('notification-container');
    const el = document.createElement('div');
    el.className = `alert ${type === 'error' ? 'error' : ''}`;
    el.innerText = msg;
    container.appendChild(el);
    
    setTimeout(() => el.classList.add('show'), 50);
    setTimeout(() => {
        el.classList.add('exit');
        setTimeout(() => el.remove(), 600);
    }, 2500);
}

// Inicializar
carregarDadosUsuario();

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && document.getElementById('cameraModal').style.display === 'flex') {
        fecharCamera();
    }
});
</script>
</body>
</html>
