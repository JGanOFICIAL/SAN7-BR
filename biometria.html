<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Biométrico - DomusFit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        :root {
            --brand-green: #8DC63F;
            --brand-green-hover: #7db135;
            --dark: #000000;
            --text-gray: #666;
            --border-color: #f0f0f0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url("https://c2a6771173.cbaul-cdnwnd.com/4f0c8b93cda84ae8665e2b589652cf30/200000013-2fae32fae5/700/3C689C7F-7879-42BA-9736-D2E498D707CE.webp?ph=c2a6771173") no-repeat center center/cover;
            background-attachment: fixed;
        }

        /* Header Fixo */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-bottom: 1px solid #eee;
            z-index: 1000;
        }

        .logo-canto-esquerdo {
            height: 32px;
            width: auto;
        }

        .btn-suporte {
            background: var(--brand-green);
            color: #fff;
            border: none;
            width: 85px;
            height: 35px;
            font-weight: 800;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Container Principal */
        .container {
            max-width: 500px;
            margin: 100px auto 40px;
            padding: 20px;
        }

        .card {
            background: #fff;
            padding: 35px 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15);
        }

        h2 {
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-gray);
            font-size: 12px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Info do Usuário */
        .user-info {
            background: #f8f8f8;
            padding: 20px;
            margin-bottom: 25px;
            border-left: 5px solid var(--brand-green);
        }

        .user-info p {
            font-size: 14px;
            margin-bottom: 8px;
            color: #333;
        }

        .user-info strong {
            color: #000;
            font-weight: 800;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            background: #fcfcfc;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--brand-green);
            background: #fff;
        }

        .optional {
            opacity: 0.7;
            font-style: italic;
        }

        /* Botões */
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        .btn-primary {
            background: var(--brand-green);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--brand-green-hover);
        }

        .btn-secondary {
            background: transparent;
            color: #444;
            border: 1px solid #eee;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        /* Modal da Câmera */
        .camera-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .camera-container {
            width: 90%;
            max-width: 800px;
            background: #000;
            position: relative;
        }

        .camera-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .camera-header span {
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
        }

        .close-camera {
            font-size: 30px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .close-camera:hover {
            opacity: 0.7;
        }

        #cameraFeed {
            width: 100%;
            height: auto;
            display: block;
        }

        .camera-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .scan-btn {
            background: var(--brand-green);
            color: #fff;
            border: none;
            padding: 15px 50px;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 40px;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .scan-btn:hover {
            background: var(--brand-green-hover);
            transform: scale(1.05);
        }

        .scan-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        /* Overlay de Carregamento */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(5px);
        }

        .loading-content {
            text-align: center;
            color: #fff;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--brand-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Notificações */
        #notification-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 3000;
        }

        .notification {
            background: #fff;
            padding: 16px 28px;
            border-right: 6px solid var(--brand-green);
            box-shadow: -15px 15px 40px rgba(0,0,0,0.12);
            margin-bottom: 12px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            transform: translateX(130%);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.error {
            border-right-color: #ff4444;
        }

        /* Preview da Foto */
        .photo-preview {
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .photo-preview img {
            max-width: 200px;
            border: 3px solid var(--brand-green);
        }

        .photo-preview p {
            margin-top: 10px;
            font-size: 12px;
            font-weight: 800;
            color: var(--brand-green);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <header>
        <img src="https://c2a6771173.cbaul-cdnwnd.com/4f0c8b93cda84ae8665e2b589652cf30/200000005-62d7c62d7e/700/9A9000A9-FCA5-4306-876F-28C2D3211763.webp" class="logo-canto-esquerdo" alt="Logo">
        <button class="btn-suporte" onclick="window.location.href='chat.html'">Suporte</button>
    </header>

    <div id="notification-container"></div>

    <div class="container">
        <div class="card">
            <h2>Cadastro Biométrico</h2>
            <p class="subtitle">Registre sua biometria facial para acesso</p>

            <div id="userInfoCard" class="user-info">
                <p><strong>NA:</strong> <span id="displayNA">Carregando...</span></p>
                <p><strong>Nome:</strong> <span id="displayNome">Carregando...</span></p>
                <p><strong>Plano:</strong> <span id="displayPlano">Carregando...</span></p>
                <p><strong>Vencimento:</strong> <span id="displayVencimento">Carregando...</span></p>
            </div>

            <form id="cadastroForm">
                <div class="input-group">
                    <label>Telefone <span class="optional">(opcional)</span></label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000">
                </div>

                <div class="input-group">
                    <label>Endereço <span class="optional">(opcional)</span></label>
                    <input type="text" id="endereco" placeholder="Rua, número, bairro">
                </div>

                <button type="button" class="btn btn-primary" id="btnCadastrarBiometria">
                    Cadastrar Biometria Facial
                </button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='dashboard.html'">
                    Voltar ao Dashboard
                </button>
            </form>

            <div id="photoPreview" class="photo-preview">
                <img id="capturedPhoto" src="" alt="Foto capturada">
                <p>✓ Biometria cadastrada com sucesso!</p>
            </div>
        </div>
    </div>

    <!-- Modal da Câmera -->
    <div class="camera-modal" id="cameraModal">
        <div class="camera-container">
            <div class="camera-header">
                <span>DOMUSFIT - CADASTRO FACIAL</span>
                <span class="close-camera" id="closeCamera">&times;</span>
            </div>
            
            <video id="cameraFeed" autoplay playsinline></video>
            
            <div class="camera-footer">
                <button class="scan-btn" id="scanButton">Escanear</button>
            </div>

            <div class="loading-overlay" id="cameraLoading">
                <div class="loading-content">
                    <div class="spinner"></div>
                    <p>PROCESSANDO IMAGEM...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.0.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <script>
        // Configuração Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBPiznHCVkTAgx6m02bZB8b0FFaot9UkBU",
            authDomain: "prefeitura-de-joao-camara.firebaseapp.com",
            projectId: "prefeitura-de-joao-camara",
            storageBucket: "prefeitura-de-joao-camara.firebasestorage.app",
            messagingSenderId: "269299041577",
            appId: "1:269299041577:web:fd41b2939240e9eb476338",
            measurementId: "G-YT7NHR342J"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Configuração Cloudinary
        const CLOUD_NAME = "dzmjto17f";
        const UPLOAD_PRESET = "ml_default";
        const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

        // Elementos DOM
        const cameraModal = document.getElementById('cameraModal');
        const cameraFeed = document.getElementById('cameraFeed');
        const scanButton = document.getElementById('scanButton');
        const closeCamera = document.getElementById('closeCamera');
        const cameraLoading = document.getElementById('cameraLoading');
        const btnCadastrar = document.getElementById('btnCadastrarBiometria');
        const photoPreview = document.getElementById('photoPreview');
        const capturedPhoto = document.getElementById('capturedPhoto');

        // Variáveis globais
        let currentUser = null;
        let userData = null;
        let modelsLoaded = false;
        let cameraStream = null;

        // Verificar usuário logado
        const loggedUser = localStorage.getItem('loggedUser');
        if (!loggedUser) {
            window.location.href = 'login.html';
        }

        // Carregar dados do usuário
        async function loadUserData() {
            try {
                const snap = await db.ref('users/' + loggedUser).get();
                if (!snap.exists()) {
                    showNotification('Usuário não encontrado', 'error');
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                    return;
                }

                userData = snap.val();
                currentUser = loggedUser;

                // Atualizar display
                document.getElementById('displayNA').textContent = loggedUser;
                document.getElementById('displayNome').textContent = userData.name || 'Não informado';
                document.getElementById('displayPlano').textContent = userData.planName || 'Padrão';
                document.getElementById('displayVencimento').textContent = userData.endDate || 'Não definido';

                // Preencher telefone e endereço se existirem
                if (userData.telefone) document.getElementById('telefone').value = userData.telefone;
                if (userData.endereco) document.getElementById('endereco').value = userData.endereco;

                // Verificar se já tem biometria cadastrada
                if (userData.biometria && userData.biometria.faceDescriptor) {
                    showNotification('Biometria já cadastrada', 'success');
                }

            } catch (error) {
                console.error('Erro ao carregar usuário:', error);
                showNotification('Erro ao carregar dados', 'error');
            }
        }

        // Função para mostrar notificações
        function showNotification(message, type = 'success') {
            const container = document.getElementById('notification-container');
            const notification = document.createElement('div');
            notification.className = `notification ${type === 'error' ? 'error' : ''}`;
            notification.textContent = message;
            container.appendChild(notification);
            
            setTimeout(() => notification.classList.add('show'), 50);
            setTimeout(() => {
                notification.classList.add('exit');
                setTimeout(() => notification.remove(), 600);
            }, 3500);
        }

        // Carregar modelos do FaceAPI
        async function loadModels() {
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
                await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
                await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
                modelsLoaded = true;
                console.log('Modelos carregados com sucesso');
            } catch (error) {
                console.error('Erro ao carregar modelos:', error);
                showNotification('Erro ao carregar modelos de reconhecimento', 'error');
            }
        }

        // Iniciar câmera
        async function startCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: 640, 
                        height: 480,
                        facingMode: 'user'
                    } 
                });
                cameraFeed.srcObject = cameraStream;
            } catch (error) {
                console.error('Erro ao acessar câmera:', error);
                showNotification('Erro ao acessar câmera', 'error');
                cameraModal.style.display = 'none';
            }
        }

        // Parar câmera
        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
        }

        // Capturar e processar face
        async function captureFace() {
            if (!modelsLoaded) {
                showNotification('Modelos ainda carregando...', 'error');
                return;
            }

            cameraLoading.style.display = 'flex';

            try {
                // Detectar face
                const detections = await faceapi.detectAllFaces(cameraFeed, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptors();

                if (detections.length === 0) {
                    throw new Error('Nenhum rosto detectado');
                }

                if (detections.length > 1) {
                    throw new Error('Múltiplos rostos detectados');
                }

                const detection = detections[0];
                
                // Criar canvas para capturar a imagem
                const canvas = document.createElement('canvas');
                canvas.width = cameraFeed.videoWidth;
                canvas.height = cameraFeed.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(cameraFeed, 0, 0, canvas.width, canvas.height);

                // Converter para base64
                const imageData = canvas.toDataURL('image/jpeg', 0.9);

                // Upload para Cloudinary
                const formData = new FormData();
                formData.append('file', imageData);
                formData.append('upload_preset', UPLOAD_PRESET);
                formData.append('public_id', `face_${loggedUser}_${Date.now()}`);

                const uploadResponse = await fetch(CLOUDINARY_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!uploadResponse.ok) throw new Error('Erro no upload da imagem');
                
                const cloudinaryData = await uploadResponse.json();

                // Salvar dados biométricos no Firebase
                const biometricData = {
                    faceDescriptor: Array.from(detection.descriptor),
                    landmarks: detection.landmarks.positions.map(p => ({ x: p.x, y: p.y })),
                    imageUrl: cloudinaryData.secure_url,
                    publicId: cloudinaryData.public_id,
                    timestamp: new Date().toISOString(),
                    version: '1.0'
                };

                // Salvar telefone e endereço se fornecidos
                const updates = {
                    telefone: document.getElementById('telefone').value,
                    endereco: document.getElementById('endereco').value,
                    biometria: biometricData
                };

                await db.ref('users/' + loggedUser).update(updates);

                // Mostrar preview
                capturedPhoto.src = cloudinaryData.secure_url;
                photoPreview.style.display = 'block';

                cameraModal.style.display = 'none';
                showNotification('Biometria cadastrada com sucesso!');

            } catch (error) {
                console.error('Erro na captura:', error);
                showNotification(error.message || 'Erro ao processar imagem', 'error');
            } finally {
                cameraLoading.style.display = 'none';
            }
        }

        // Event Listeners
        btnCadastrar.addEventListener('click', async () => {
            if (!modelsLoaded) {
                showNotification('Carregando modelos...', 'error');
                return;
            }
            
            cameraModal.style.display = 'flex';
            await startCamera();
        });

        closeCamera.addEventListener('click', () => {
            cameraModal.style.display = 'none';
            stopCamera();
        });

        scanButton.addEventListener('click', captureFace);

        // Fechar modal com ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && cameraModal.style.display === 'flex') {
                cameraModal.style.display = 'none';
                stopCamera();
            }
        });

        // Inicialização
        loadUserData();
        loadModels();
    </script>
</body>
</html>
