        }

        #videoElement {

        #canvasOverlay {

            left: 0;

        }

        /* Sobreposição do teclado NA - VERSÃO MODERNA */
        .na-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(20,20,20,0.98) 100%);
            backdrop-filter: blur(15px);

        @keyframes fadeIn {

        .na-header {
            position: absolute;

            left: 0;
            right: 0;
            text-align: center;
            color: #fff;
            font-size: 14px;

            text-transform: uppercase;
            font-weight: 300;

        }

        .na-display-container::before {

        .na-display span {

        .na-teclado {

            width: 90%;

        .na-tecla {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);

            font-size: 32px;

        .na-tecla:hover {

        }

        .na-tecla.limpar {

        .na-tecla.limpar:hover {

            font-size: 14px;

        .btn-na:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Status da catraca */
        .catraca-status {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #666;
            z-index: 150;

            display: flex;
            align-items: center;
            justify-content: center;

            text-transform: uppercase;

        }

        .catraca-status.connected {
            background: var(--brand-green);
            box-shadow: 0 0 30px var(--brand-green);
            animation: pulseCatraca 2s infinite;
        }

        .catraca-status.connected::after {
            content: 'USB';
        }

        .catraca-status.disconnected {
            background: #666;
        }

        .catraca-status.disconnected::after {
            content: '!';

        }

        @keyframes pulseCatraca {
            0% { box-shadow: 0 0 0 0 rgba(141, 198, 63, 0.7); }
            70% { box-shadow: 0 0 0 25px rgba(141, 198, 63, 0); }
            100% { box-shadow: 0 0 0 0 rgba(141, 198, 63, 0); }
        }

        /* Indicador de conexão USB */
        .usb-info {
            position: absolute;
            bottom: 140px;

            display: none;
        }

        .usb-info.visible {
            display: block;
        }
    </style>

<script>
// Configurações Firebase
const firebaseConfig = {
    apiKey: "AIzaSyBPiznHCVkTAgx6m02bZB8b0FFaot9UkBU",

    measurementId: "G-YT7NHR342J"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Variáveis globais
let videoStream = null;
let faceMatcher = null;
let labeledDescriptors = [];
let isProcessing = false;
let lastDetectionTime = 0;
const DETECTION_COOLDOWN = 2000;
let catracaConectada = false;
let catracaDevice = null;
let naDigitado = '';
let tentativasReconexao = 0;
const MAX_TENTATIVAS_RECONEXAO = 5;

// Carregar modelos FaceAPI
async function carregarModelos() {
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    
    try {
        await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);
        console.log('Modelos carregados com sucesso');
    } catch (error) {
        console.error('Erro ao carregar modelos:', error);
    }
}

// Carregar todas as biometrias do Firebase
async function carregarBiometrias() {
    try {
        const snap = await db.ref('users').get();
        if (!snap.exists()) return;
        
        labeledDescriptors = [];
        
        snap.forEach(childSnapshot => {
            const user = childSnapshot.val();
            if (user.biometria && user.biometria.descriptor) {
                try {
                    const descriptor = new Float32Array(user.biometria.descriptor);
                    const labeledDescriptor = new faceapi.LabeledFaceDescriptors(
                        childSnapshot.key,
                        [descriptor]
                    );
                    labeledDescriptors.push(labeledDescriptor);
                } catch (e) {
                    console.error('Erro ao processar biometria do usuário', childSnapshot.key);
                }
            }
        });
        
        if (labeledDescriptors.length > 0) {
            faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
            console.log(`Carregadas ${labeledDescriptors.length} biometrias`);
        }
        
    } catch (error) {
        console.error('Erro ao carregar biometrias:', error);
    }
}

// DETECÇÃO E CONEXÃO REAL COM CATRACA USB
async function detectarEConectarCatraca() {
    const usbInfo = document.getElementById('usbInfo');
    const catracaStatus = document.getElementById('catracaStatus');
    
    try {
        // Verificar suporte a WebUSB
        if (!('usb' in navigator)) {
            usbInfo.textContent = 'WEBSUSB NÃO SUPORTADO';
            usbInfo.style.borderLeftColor = '#ff4444';
            usbInfo.classList.add('visible');
            
            // Fallback para simulação apenas em desenvolvimento
            if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
                setTimeout(() => {
                    catracaConectada = true;
                    catracaStatus.classList.remove('disconnected');
                    catracaStatus.classList.add('connected');
                    usbInfo.textContent = 'MODO SIMULAÇÃO ATIVADO';
                    usbInfo.style.borderLeftColor = '#ffaa00';
                }, 2000);
            }
            return;
        }

        // Solicitar dispositivo USB
        try {
            const devices = await navigator.usb.getDevices();
            
            if (devices.length === 0) {
                // Se não há dispositivos pareados, tentar solicitar
                try {
                    catracaDevice = await navigator.usb.requestDevice({
                        filters: [
                            // Filtros comuns para catracas e controladores USB
                            { vendorId: 0x0403 }, // FTDI
                            { vendorId: 0x10C4 }, // Silicon Labs
                            { vendorId: 0x1A86 }, // QinHeng
                            { vendorId: 0x067B }, // Prolific
                            { vendorId: 0x2341 }  // Arduino
                        ]
                    });
                    
                    if (catracaDevice) {
                        await conectarDispositivo(catracaDevice);
                    }
                } catch (requestError) {
                    console.log('Usuário cancelou seleção de dispositivo');
                    usbInfo.textContent = 'SELECIONE O DISPOSITIVO DA CATRACA';
                }
            } else {
                // Usar primeiro dispositivo encontrado
                catracaDevice = devices[0];
                await conectarDispositivo(catracaDevice);
            }
        } catch (error) {
            console.error('Erro ao acessar USB:', error);
            usbInfo.textContent = 'ERRO: ' + error.message.substring(0, 30);
        }

    } catch (error) {
        console.error('Erro fatal na detecção USB:', error);
    }
}

// Conectar e configurar dispositivo USB
async function conectarDispositivo(device) {
    const usbInfo = document.getElementById('usbInfo');
    const catracaStatus = document.getElementById('catracaStatus');
    
    try {
        await device.open();
        
        // Selecionar configuração padrão
        if (device.configuration === null) {
            await device.selectConfiguration(1);
        }
        
        // Tentar reivindicar interface
        try {
            await device.claimInterface(0);
        } catch (interfaceError) {
            console.log('Interface já reivindicada ou não disponível');
        }
        
        // Verificar se conseguiu controle
        catracaConectada = true;
        catracaStatus.classList.remove('disconnected');
        catracaStatus.classList.add('connected');
        
        // Mostrar informações do dispositivo
        usbInfo.innerHTML = `CONECTADO: ${device.productName || 'Catraca USB'}<br>${device.manufacturerName || ''}`;
        usbInfo.style.borderLeftColor = 'var(--brand-green)';
        usbInfo.classList.add('visible');
        
        console.log('Catraca conectada:', device);
        
        // Monitorar desconexão
        navigator.usb.addEventListener('disconnect', (event) => {
            if (event.device === device) {
                catracaConectada = false;
                catracaDevice = null;
                catracaStatus.classList.remove('connected');
                catracaStatus.classList.add('disconnected');
                usbInfo.innerHTML = 'CATRACA DESCONECTADA';
                usbInfo.style.borderLeftColor = '#ff4444';
                
                // Tentar reconectar
                tentarReconectar();
            }
        });
        
    } catch (error) {
        console.error('Erro ao conectar dispositivo:', error);
        usbInfo.textContent = 'FALHA NA CONEXÃO';
        usbInfo.style.borderLeftColor = '#ff4444';
    }
}

// Tentar reconectar em caso de desconexão
async function tentarReconectar() {
    if (tentativasReconexao >= MAX_TENTATIVAS_RECONEXAO) {
        document.getElementById('usbInfo').innerHTML = 'FALHA NA RECONEXÃO<br>REINICIE O SISTEMA';
        return;
    }
    
    tentativasReconexao++;
    
    setTimeout(async () => {
        console.log(`Tentativa de reconexão ${tentativasReconexao}`);
        await detectarEConectarCatraca();
    }, 5000 * tentativasReconexao);
}

// Comando REAL para liberar catraca via USB
async function liberarCatraca() {
    if (!catracaConectada || !catracaDevice) {
        console.log('Catraca não conectada');
        return false;
    }
    
    try {
        // Protocolos comuns para catracas:
        // 1. Pulso digital (0x01, 0x00)
        // 2. Comando serial (0xAA, 0x01, 0x55)
        // 3. Sinal TTL
        
        const comandosPossiveis = [
            new Uint8Array([0x01, 0x00, 0x01]), // Protocolo genérico
            new Uint8Array([0xAA, 0x01, 0x55]), // Protocolo com checksum
            new Uint8Array([0x02, 0x00, 0x00]), // Segundo protocolo
            new Uint8Array([0xFF, 0x01, 0x00])  // Terceiro protocolo
        ];
        
        let liberado = false;
        
        for (const comando of comandosPossiveis) {
            try {
                // Tentar enviar comando
                if (catracaDevice.opened) {
                    const result = await catracaDevice.transferOut(1, comando);
                    if (result.status === 'ok') {
                        liberado = true;
                        console.log('Comando enviado:', comando);
                        break;
                    }
                }
            } catch (cmdError) {
                console.log('Comando falhou, tentando próximo');
            }
        }
        
        if (liberado) {
            console.log('Catraca liberada via USB');
            
            // Pequeno delay para o pulso
            await new Promise(resolve => setTimeout(resolve, 500));
            
            return true;
        }
        
        return false;
        
    } catch (error) {
        console.error('Erro ao liberar catraca:', error);
        return false;
    }
}

// Iniciar câmera
async function iniciarCamera() {
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: { ideal: 1280 },
                height: { ideal: 720 },
                facingMode: 'user',
                frameRate: { ideal: 30 }
            } 
        });
        
        const video = document.getElementById('videoElement');
        video.srcObject = videoStream;
        
        video.addEventListener('play', () => {
            console.log('Câmera iniciada');
            reconhecimentoContinuo();
        });
        
    } catch (error) {
        console.error('Erro ao iniciar câmera:', error);
        mostrarMensagem('ERRO NA CÂMERA', 'error');
    }
}

// Reconhecimento contínuo
async function reconhecimentoContinuo() {
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasOverlay');
    const ctx = canvas.getContext('2d');
    
    if (!video.videoWidth) {
        setTimeout(reconhecimentoContinuo, 100);
        return;
    }
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const options = new faceapi.TinyFaceDetectorOptions({ 
        inputSize: 320,
        scoreThreshold: 0.5
    });
    
    setInterval(async () => {
        if (!video.videoWidth || isProcessing || !faceMatcher) return;
        
        const now = Date.now();
        if (now - lastDetectionTime < DETECTION_COOLDOWN) return;
        
        try {
            const detections = await faceapi.detectAllFaces(video, options)
                .withFaceLandmarks()
                .withFaceDescriptors();
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (detections.length > 0) {
                faceapi.draw.drawFaceLandmarks(canvas, detections.map(d => d.landmarks));
                
                const bestDetection = detections[0];
                const bestMatch = faceMatcher.findBestMatch(bestDetection.descriptor);
                
                if (bestMatch.label !== 'unknown') {
                    await processarAcesso(bestMatch.label);
                    lastDetectionTime = now;
                }
            }
            
        } catch (error) {
            console.error('Erro no reconhecimento:', error);
        }
    }, 100);
}

// Processar acesso (facial ou NA)
async function processarAcesso(na) {
    if (isProcessing) return;
    
    isProcessing = true;
    
    try {
        document.getElementById('processingOverlay').style.display = 'flex';
        
        const snap = await db.ref('users/' + na).get();
        if (!snap.exists()) {
            mostrarMensagem('NA NÃO ENCONTRADO', 'error');
            return;
        }
        
        const user = snap.val();
        const today = new Date().toISOString().slice(0,10);
        
        if (!user.active || (user.endDate && user.endDate < today)) {
            mostrarMensagem('PLANO INATIVO', 'error');
            return;
        }
        
        // TENTAR LIBERAR CATRACA VIA USB
        let liberado = false;
        
        if (catracaConectada) {
            liberado = await liberarCatraca();
        } else {
            // Se não tem catraca, tentar reconectar
            mostrarMensagem('AGUARDANDO CATRACA', 'error');
            await detectarEConectarCatraca();
            if (catracaConectada) {
                liberado = await liberarCatraca();
            }
        }
        
        if (liberado || location.hostname === 'localhost') { // Permitir teste local
            if (!liberado && location.hostname === 'localhost') {
                console.log('Modo teste: simulando liberação');
            }
            
            await db.ref('acessos/' + na).push({
                data: new Date().toISOString(),
                tipo: naDigitado ? 'manual' : 'facial'
            });
            
            mostrarMensagem('ACESSO LIBERADO', 'success');
            mostrarInfoUsuario(user, na);
            
            // Limpar NA digitado
            naDigitado = '';
            if (document.getElementById('naOverlay').style.display === 'flex') {
                fecharNAOverlay();
            }
        } else {
            mostrarMensagem('ERRO NA CATRACA', 'error');
        }
        
    } catch (error) {
        console.error('Erro no processamento:', error);
        mostrarMensagem('ERRO NO SISTEMA', 'error');
        
    } finally {
        setTimeout(() => {
            document.getElementById('processingOverlay').style.display = 'none';
            isProcessing = false;
            
            setTimeout(() => {
                document.getElementById('userInfoFooter').style.display = 'none';
                document.getElementById('defaultFooter').style.display = 'block';
            }, 3000);
        }, 1500);
    }
}

// Funções para o teclado NA
function mostrarNAOverlay() {
    document.getElementById('naOverlay').style.display = 'flex';
    document.getElementById('modeIndicator').textContent = 'MODO: DIGITAÇÃO NA';
    document.getElementById('modeIndicator').classList.remove('biometric');
    limparNA();
}

function fecharNAOverlay() {
    document.getElementById('naOverlay').style.display = 'none';
    document.getElementById('modeIndicator').textContent = 'MODO: BIOMÉTRICO';
    document.getElementById('modeIndicator').classList.add('biometric');
    limparNA();
}

function adicionarDigito(digito) {
    if (naDigitado.length < 5) {
        naDigitado += digito;
        atualizarDisplayNA();
    }
}

function limparNA() {
    naDigitado = '';
    atualizarDisplayNA();
}

function atualizarDisplayNA() {
    const display = document.getElementById('naDisplay');
    const confirmarBtn = document.getElementById('confirmarNA');
    
    const spans = display.children;
    for (let i = 0; i < 5; i++) {
        if (i < naDigitado.length) {
            spans[i].textContent = naDigitado[i];
        } else {
            spans[i].textContent = '_';
        }
    }
    
    confirmarBtn.disabled = naDigitado.length !== 5;
}

async function confirmarNA() {
    if (naDigitado.length === 5 && !isProcessing) {
        fecharNAOverlay();
        await processarAcesso(naDigitado);
    }
}

// Mostrar mensagem
function mostrarMensagem(texto, tipo) {
    const overlay = document.getElementById('messageOverlay');
    overlay.className = `message-overlay ${tipo}`;
    overlay.textContent = texto;
    overlay.style.display = 'block';
    
    setTimeout(() => {
        overlay.style.display = 'none';
    }, 2000);
}

// Mostrar informações do usuário
function mostrarInfoUsuario(user, na) {
    const footer = document.getElementById('userInfoFooter');
    const defaultFooter = document.getElementById('defaultFooter');
    const userPhoto = document.getElementById('userPhoto');
    const userName = document.getElementById('userName');
    
    userPhoto.src = user.biometria?.foto || 'https://via.placeholder.com/40';
    userName.textContent = user.name || `NA: ${na}`;
    
    defaultFooter.style.display = 'none';
    footer.style.display = 'flex';
}

// Inicializar sistema
async function inicializar() {
    await carregarModelos();
    await carregarBiometrias();
    await detectarEConectarCatraca();
    await iniciarCamera();
    
    // Recarregar biometrias periodicamente
    setInterval(carregarBiometrias, 5 * 60 * 1000);
    
    // Verificar conexão USB periodicamente
    setInterval(() => {
        if (!catracaConectada && tentativasReconexao < MAX_TENTATIVAS_RECONEXAO) {
            detectarEConectarCatraca();
        }
    }, 30000);
}

window.addEventListener('load', inicializar);

// Gerenciar pausa da câmera
document.addEventListener('visibilitychange', () => {
    if (document.hidden && videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
    } else if (!document.hidden) {
        iniciarCamera();
    }
});

// Suporte a teclado para digitação rápida
document.addEventListener('keydown', (e) => {
    if (document.getElementById('naOverlay').style.display === 'flex') {
        if (e.key >= '0' && e.key <= '9') {
            adicionarDigito(e.key);
        } else if (e.key === 'Backspace') {
            naDigitado = naDigitado.slice(0, -1);
            atualizarDisplayNA();
        } else if (e.key === 'Enter' && naDigitado.length === 5) {
            confirmarNA();
        } else if (e.key === 'Escape') {
            fecharNAOverlay();
        }
    } else if (e.key === 'n' || e.key === 'N') {
        mostrarNAOverlay();
    }
});
</script>
