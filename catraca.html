    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        :root {

            height: 40px;

            position: absolute;
            right: 20px;
            background: #333;
            color: #fff;

            font-size: 10px;
            font-weight: 800;
            border-radius: 0;
            text-transform: uppercase;
        }

        }

        .camera-container {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 60px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvasOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Sobreposição do teclado NA */
        .na-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 250;

        .na-display {
            background: #222;
            padding: 30px 50px;
            margin-bottom: 30px;
            border-left: 6px solid var(--brand-green);

        .na-display span {
            font-size: 64px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 10px;
            font-family: monospace;
        }

            display: grid;

            gap: 15px;
            max-width: 400px;

            color: #fff;

            transition: 0.2s;

            justify-content: center;

            background: #ff4444;
        }

            cursor: not-allowed;

        }

            align-items: center;

// ============================================
// GERENCIAMENTO DA CATRACA USB - VERSÃO REAL
// ============================================

class GerenciadorCatraca {
    constructor() {
        this.device = null;
        this.connected = false;
        this.protocol = null;
        this.deviceInfo = null;
        this.reconnectAttempts = 0;
        this.maxReconnectAttempts = 10;
        this.reconnectTimeout = null;
        this.supportedProtocols = [
            { name: 'FTDI', vid: [0x0403], pid: [0x6001, 0x6010, 0x6011, 0x6014] },
            { name: 'Silicon Labs', vid: [0x10C4], pid: [0xEA60] },
            { name: 'Prolific', vid: [0x067B], pid: [0x2303] },
            { name: 'Arduino', vid: [0x2341, 0x2A03], pid: [] },
            { name: 'Generic', vid: [], pid: [] }
        ];
    }

    // Verificar suporte a WebUSB
    isSupported() {
        return 'usb' in navigator;
    }

    // Solicitar permissão para conectar
    async solicitarDispositivo() {
        try {
            if (!this.isSupported()) {
                throw new Error('WebUSB não suportado neste navegador');
            }

            // Filtrar por dispositivos conhecidos
            const filters = [
                { vendorId: 0x0403 }, // FTDI
                { vendorId: 0x10C4 }, // Silicon Labs
                { vendorId: 0x067B }, // Prolific
                { vendorId: 0x2341 }, // Arduino
                { vendorId: 0x2A03 }  // Arduino
            ];

            this.device = await navigator.usb.requestDevice({ filters });
            await this.conectarDispositivo(this.device);
            return true;

        } catch (error) {
            console.error('Erro ao solicitar dispositivo:', error);
            this.atualizarStatus('error', 'Permissão negada');
            return false;
        }
    }

    // Detectar dispositivos já pareados
    async detectarDispositivos() {
        try {
            if (!this.isSupported()) {
                this.fallbackSimulacao();
                return false;
            }

            const devices = await navigator.usb.getDevices();
            
            if (devices.length > 0) {
                // Tenta conectar ao primeiro dispositivo encontrado
                await this.conectarDispositivo(devices[0]);
                return true;
            } else {
                this.atualizarStatus('connecting', 'Nenhum dispositivo pareado');
                return false;
            }

        } catch (error) {
            console.error('Erro na detecção:', error);
            this.fallbackSimulacao();
            return false;
        }
    }

    // Conectar a um dispositivo específico
    async conectarDispositivo(device) {
        try {
            this.atualizarStatus('connecting', 'Conectando...');
            
            await device.open();
            await device.selectConfiguration(1);
            await device.claimInterface(0);
            
            this.device = device;
            this.connected = true;
            this.reconnectAttempts = 0;
            
            // Identificar protocolo
            this.protocol = this.identificarProtocolo(device);
            this.deviceInfo = {
                name: device.productName || 'Dispositivo USB',
                manufacturer: device.manufacturerName || 'Desconhecido',
                serialNumber: device.serialNumber || 'N/A',
                vendorId: device.vendorId,
                productId: device.productId
            };
            
            this.atualizarStatus('connected', 'Conectado');
            this.monitorarDesconexao();
            
            return true;

        } catch (error) {
            console.error('Erro na conexão:', error);
            this.connected = false;
            this.atualizarStatus('error', 'Falha na conexão');
            return false;
        }
    }

    // Identificar protocolo do dispositivo
    identificarProtocolo(device) {
        for (const proto of this.supportedProtocols) {
            if (proto.vid.includes(device.vendorId)) {
                if (proto.pid.length === 0 || proto.pid.includes(device.productId)) {
                    return proto.name;
                }
            }
        }
        return 'Desconhecido';
    }

    // Monitorar desconexão
    monitorarDesconexao() {
        if (this.device) {
            this.device.onerror = () => {
                this.handleDisconnect();
            };
        }

        navigator.usb.addEventListener('disconnect', (event) => {
            if (this.device && event.device === this.device) {
                this.handleDisconnect();
            }
        });
    }

    // Lidar com desconexão
    handleDisconnect() {
        this.connected = false;
        this.device = null;
        this.atualizarStatus('error', 'Desconectado');
        
        // Tentar reconectar com backoff exponencial
        this.tentarReconexao();
    }

    // Tentar reconexão com backoff exponencial
    tentarReconexao() {
        if (this.reconnectAttempts >= this.maxReconnectAttempts) {
            this.atualizarStatus('error', 'Falha na reconexão');
            return;
        }

        const delay = Math.min(1000 * Math.pow(2, this.reconnectAttempts), 30000);
        
        this.reconnectAttempts++;
        this.atualizarStatus('connecting', `Reconectando (${this.reconnectAttempts}/${this.maxReconnectAttempts})...`);

        if (this.reconnectTimeout) {
            clearTimeout(this.reconnectTimeout);
        }

        this.reconnectTimeout = setTimeout(async () => {
            const devices = await navigator.usb.getDevices();
            if (devices.length > 0) {
                await this.conectarDispositivo(devices[0]);
            } else {
                this.tentarReconexao();
            }
        }, delay);
    }

    // Enviar comando para liberar catraca
    async liberarAcesso() {
        if (!this.connected || !this.device) {
            console.log('Catraca não conectada');
            return false;
        }

        try {
            // Protocolos específicos por fabricante
            switch(this.protocol) {
                case 'FTDI':
                case 'Silicon Labs':
                case 'Prolific':
                    // Protocolo padrão RS232 via USB
                    const comandoPadrao = new Uint8Array([0x01, 0x00, 0x01]);
                    await this.device.transferOut(1, comandoPadrao);
                    break;
                    
                case 'Arduino':
                    // Protocolo Arduino Serial
                    const comandoArduino = new TextEncoder().encode('LIBERAR\n');
                    await this.device.transferOut(1, comandoArduino);
                    break;
                    
                default:
                    // Protocolo genérico - tenta múltiplos comandos
                    const comandos = [
                        new Uint8Array([0x01, 0x00, 0x01]),
                        new Uint8Array([0x00, 0x01]),
                        new TextEncoder().encode('OPEN'),
                        new TextEncoder().encode('1')
                    ];
                    
                    for (const cmd of comandos) {
                        try {
                            await this.device.transferOut(1, cmd);
                            break;
                        } catch (e) {
                            continue;
                        }
                    }
            }
            
            console.log(`Catraca liberada via ${this.protocol}`);
            return true;

        } catch (error) {
            console.error('Erro ao liberar catraca:', error);
            return false;
        }
    }

    // Desconectar
    async desconectar() {
        if (this.device) {
            try {
                await this.device.close();
            } catch (e) {}
            this.device = null;
        }
        this.connected = false;
        if (this.reconnectTimeout) {
            clearTimeout(this.reconnectTimeout);
        }
    }

    // Fallback para simulação (quando WebUSB não suportado)
    fallbackSimulacao() {
        console.log('WebUSB não suportado - modo simulação');
        this.connected = true;
        this.protocol = 'Simulação';
        this.deviceInfo = {
            name: 'Simulação',
            manufacturer: 'Software',
            serialNumber: 'SIM-001'
        };
        this.atualizarStatus('connected', 'Simulação');
    }

    // Atualizar interface
    atualizarStatus(status, mensagem) {
        const led = document.getElementById('catracaStatus');
        const info = document.getElementById('catracaInfo');
        const statusText = document.getElementById('catracaStatusText');
        const deviceName = document.getElementById('catracaDeviceName');
        const protocolText = document.getElementById('catracaProtocol');
        
        led.className = `catraca-status-led ${status}`;
        
        if (status === 'connected') {
            info.classList.add('show');
            statusText.textContent = mensagem || 'Conectado';
            deviceName.textContent = this.deviceInfo?.name || '-';
            protocolText.textContent = this.protocol || '-';
        } else if (status === 'connecting') {
            info.classList.add('show');
            statusText.textContent = mensagem || 'Conectando...';
            deviceName.textContent = this.deviceInfo?.name || '-';
            protocolText.textContent = this.protocol || '-';
        } else if (status === 'error') {
            info.classList.add('show');
            statusText.textContent = mensagem || 'Erro';
            deviceName.textContent = '-';
            protocolText.textContent = '-';
        } else {
            info.classList.remove('show');
        }
    }

    // Obter status
    getStatus() {
        return {
            connected: this.connected,
            protocol: this.protocol,
            deviceInfo: this.deviceInfo
        };
    }
}

async function carregarModelos() {
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    
    await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    ]);
}

// Carregar biometrias
async function carregarBiometrias() {
    try {
        const snap = await db.ref('users').get();
        if (!snap.exists()) return;
        
        labeledDescriptors = [];
        
        snap.forEach(childSnapshot => {
            const user = childSnapshot.val();
            if (user.biometria && user.biometria.descriptor) {
                const descriptor = new Float32Array(user.biometria.descriptor);
                const labeledDescriptor = new faceapi.LabeledFaceDescriptors(
                    childSnapshot.key,
                    [descriptor]
                );
                labeledDescriptors.push(labeledDescriptor);
            }
        });
        
        if (labeledDescriptors.length > 0) {
            faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
            console.log(`Carregadas ${labeledDescriptors.length} biometrias`);
        }
        
    } catch (error) {
        console.error('Erro ao carregar biometrias:', error);
    }
}

// Conectar catraca
async function conectarCatraca() {
    try {
        // Primeiro tenta detectar dispositivos já pareados
        const detected = await catracaManager.detectarDispositivos();
        
        if (!detected && catracaManager.isSupported()) {
            // Se não encontrou, solicita permissão
            await catracaManager.solicitarDispositivo();
        }
    } catch (error) {
        console.error('Erro na conexão da catraca:', error);
    }
}

// Iniciar câmera
async function iniciarCamera() {
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: 1280, 
                height: 720,
                facingMode: 'user',
                frameRate: { ideal: 30 }
            } 
        });
        
        const video = document.getElementById('videoElement');
        video.srcObject = videoStream;
        
        video.addEventListener('play', reconhecimentoContinuo);
        
    } catch (error) {
        console.error('Erro ao iniciar câmera:', error);
    }
}

// Reconhecimento contínuo
async function reconhecimentoContinuo() {
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasOverlay');
    const ctx = canvas.getContext('2d');
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const options = new faceapi.TinyFaceDetectorOptions({ 
        inputSize: 320,
        scoreThreshold: 0.5
    });
    
    setInterval(async () => {
        if (!video.videoWidth || isProcessing) return;
        
        const now = Date.now();
        if (now - lastDetectionTime < DETECTION_COOLDOWN) return;
        
        try {
            const detections = await faceapi.detectAllFaces(video, options)
                .withFaceLandmarks()
                .withFaceDescriptors();
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (detections.length > 0 && faceMatcher) {
                faceapi.draw.drawFaceLandmarks(canvas, detections.map(d => d.landmarks));
                
                const bestDetection = detections[0];
                const bestMatch = faceMatcher.findBestMatch(bestDetection.descriptor);
                
                if (bestMatch.label !== 'unknown') {
                    await processarAcesso(bestMatch.label);
                    lastDetectionTime = now;
                }
            }
            
        } catch (error) {
            console.error('Erro no reconhecimento:', error);
        }
    }, 100);
}

// Processar acesso
async function processarAcesso(na) {
    isProcessing = true;
    
    try {
        document.getElementById('processingOverlay').style.display = 'flex';
        
        const snap = await db.ref('users/' + na).get();
        if (!snap.exists()) {
            mostrarMensagem('NA NÃO ENCONTRADO', 'error');
            return;
        }
        
        const user = snap.val();
        const today = new Date().toISOString().slice(0,10);
        
        if (!user.active || (user.endDate && user.endDate < today)) {
            mostrarMensagem('PLANO INATIVO', 'error');
            return;
        }
        
        // Liberar catraca real
        const liberado = await catracaManager.liberarAcesso();
        
        if (liberado) {
            await db.ref('acessos/' + na).push({
                data: new Date().toISOString(),
                tipo: naDigitado ? 'manual' : 'facial'
            });
            
            mostrarMensagem('ACESSO LIBERADO', 'success');
            mostrarInfoUsuario(user, na);
            
            naDigitado = '';
            if (document.getElementById('naOverlay').style.display === 'flex') {
                fecharNAOverlay();
            }
        } else {
            mostrarMensagem('ERRO NA CATRACA', 'error');
        }
        
    } catch (error) {
        console.error('Erro no processamento:', error);
        mostrarMensagem('ERRO NO SISTEMA', 'error');
        
    } finally {
        setTimeout(() => {
            document.getElementById('processingOverlay').style.display = 'none';
            isProcessing = false;
            
            setTimeout(() => {
                document.getElementById('userInfoFooter').style.display = 'none';
                document.getElementById('defaultFooter').style.display = 'block';
            }, 3000);
        }, 2000);
    }
}

// Funções NA
function mostrarNAOverlay() {
    document.getElementById('naOverlay').style.display = 'flex';
    document.getElementById('modeIndicator').textContent = 'MODO: DIGITAÇÃO NA';
    document.getElementById('modeIndicator').classList.remove('biometric');
    limparNA();
}

function fecharNAOverlay() {
    document.getElementById('naOverlay').style.display = 'none';
    document.getElementById('modeIndicator').textContent = 'MODO: BIOMÉTRICO';
    document.getElementById('modeIndicator').classList.add('biometric');
    limparNA();
}

function adicionarDigito(digito) {
    if (naDigitado.length < 5) {
        naDigitado += digito;
        atualizarDisplayNA();
    }
}

function limparNA() {
    naDigitado = '';
    atualizarDisplayNA();
}

function atualizarDisplayNA() {
    const display = document.getElementById('naDisplay');
    const confirmarBtn = document.getElementById('confirmarNA');
    
    let texto = naDigitado;
    while (texto.length < 5) {
        texto += '_';
    }
    display.textContent = texto;
    
    confirmarBtn.disabled = naDigitado.length !== 5;
}

async function confirmarNA() {
    if (naDigitado.length === 5 && !isProcessing) {
        fecharNAOverlay();
        await processarAcesso(naDigitado);
    }
}

// Suporte a teclado físico
document.addEventListener('keydown', (e) => {
    // Se o overlay NA estiver aberto
    if (document.getElementById('naOverlay').style.display === 'flex') {
        if (e.key >= '0' && e.key <= '9') {
            adicionarDigito(e.key);
        } else if (e.key === 'Enter') {
            confirmarNA();
        } else if (e.key === 'Escape') {
            fecharNAOverlay();
        } else if (e.key === 'Backspace') {
            naDigitado = naDigitado.slice(0, -1);
            atualizarDisplayNA();
        }
    } else {
        // Se não estiver no overlay, números abrem o teclado
        if (e.key >= '0' && e.key <= '9') {
            mostrarNAOverlay();
            adicionarDigito(e.key);
        }
    }
});

// Mostrar dica de teclado
setInterval(() => {
    const hint = document.getElementById('keyboardHint');
    if (document.getElementById('naOverlay').style.display !== 'flex') {
        hint.classList.add('show');
        setTimeout(() => hint.classList.remove('show'), 3000);
    }
}, 30000); // A cada 30 segundos

// Mostrar mensagem
function mostrarMensagem(texto, tipo) {
    const overlay = document.getElementById('messageOverlay');
    overlay.className = `message-overlay ${tipo}`;
    overlay.textContent = texto;
    overlay.style.display = 'block';
    
    setTimeout(() => {
        overlay.style.display = 'none';
    }, 2000);
}

// Mostrar informações do usuário
function mostrarInfoUsuario(user, na) {
    const footer = document.getElementById('userInfoFooter');
    const defaultFooter = document.getElementById('defaultFooter');
    const userPhoto = document.getElementById('userPhoto');
    const userName = document.getElementById('userName');
    
    userPhoto.src = user.biometria?.foto || 'https://via.placeholder.com/40';
    userName.textContent = user.name || `NA: ${na}`;
    
    defaultFooter.style.display = 'none';
    footer.style.display = 'flex';
}

// Inicializar sistema
async function inicializar() {
    await carregarModelos();
    await carregarBiometrias();
    await conectarCatraca();
    await iniciarCamera();
    
    setInterval(carregarBiometrias, 5 * 60 * 1000);
}

window.addEventListener('load', inicializar);

document.addEventListener('visibilitychange', () => {
    if (document.hidden && videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
    } else if (!document.hidden) {
        iniciarCamera();
    }
});

// Limpar recursos ao fechar
window.addEventListener('beforeunload', () => {
    catracaManager.desconectar();
});
</script>
