<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ponto Digital - DomusFit</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* VARIÁVEIS DE CORES - FUNDO TOTALMENTE BRANCO, CABEÇALHO AZUL ESCURO */
:root {
  --primary-color: #003366; /* Azul Escuro DomusFit - cabeçalho */
  --secondary-color: #2c7da0; /* Azul governamental suave */
  --accent-green: #2e7d32; /* Verde profissional */
  --text-dark: #1a2c3e;
  --text-light: #fff;
  --border-light: #e9ecef;
  --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
  --bg-white: #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg-white); /* FUNDO TOTALMENTE BRANCO */
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  color: var(--text-dark);
}

/* CABEÇALHO AZUL ESCURO COLADO AO TOPO */
.header {
  background: var(--primary-color);
  padding: 0 40px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow-sm);
  position: sticky;
  top: 0;
  z-index: 100;
  width: 100%;
}

.logo {
  width: 220px;
  height: 50px;
  background-image: url('https://c2a6771173.cbaul-cdnwnd.com/4f0c8b93cda84ae8665e2b589652cf30/200000083-d9fb4d9fb6/700/3F36BE85-5E12-4237-844C-9BD82571F2C4.webp');
  background-repeat: no-repeat;
  background-size: contain;
  background-position: left;
  filter: brightness(0) invert(1); /* Logo branca sobre fundo azul */
}

/* DADOS DO FUNCIONÁRIO - MODELO PROFISSIONAL COLADO AO CABEÇALHO */
.user-card {
  background: var(--bg-white);
  border-radius: 20px;
  box-shadow: var(--shadow-sm);
  padding: 20px 32px;
  margin: 24px 40px 0 40px;
  display: flex;
  align-items: center;
  gap: 28px;
  border: 1px solid var(--border-light);
  transition: all 0.2s;
}

.user-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--secondary-color);
  background: #f0f4fa;
}

.user-info h2 {
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--primary-color);
  margin-bottom: 6px;
}

.user-info p {
  font-size: 0.95rem;
  color: #4a627a;
  margin: 4px 0;
  display: inline-block;
  margin-right: 28px;
}

.user-info p strong {
  font-weight: 600;
  color: var(--text-dark);
}

/* ÁREA PRINCIPAL - FUNDO BRANCO */
.main-content {
  flex: 1;
  padding: 0 40px 40px 40px;
  background: var(--bg-white);
}

/* CAMERA OVAL MODERNO */
.camera-oval-container {
  display: flex;
  justify-content: center;
  margin: 25px 0 15px 0;
}

.face-oval {
  width: 260px;
  height: 320px;
  border-radius: 50%;
  overflow: hidden;
  background: #eef2f7;
  border: 4px solid var(--secondary-color);
  box-shadow: 0 12px 28px rgba(0,0,0,0.15);
  position: relative;
  display: none; /* inicialmente escondido, aparece ao permitir câmera */
  margin: 0 auto;
}

.face-oval video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}

/* CRONÔMETRO ESTILO MODERNO */
.timer-wrapper {
  text-align: center;
  margin: 20px 0 20px;
}

.cronometro {
  font-size: 64px;
  font-weight: 700;
  font-family: monospace;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  text-shadow: none;
  margin: 10px 0;
}

/* BOTÕES PRINCIPAIS */
.button-group {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin: 30px 0 40px;
  flex-wrap: wrap;
}

.btn {
  padding: 14px 32px;
  font-size: 1rem;
  font-weight: 600;
  border: none;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.2s ease;
  background: var(--bg-white);
  color: var(--primary-color);
  border: 1.5px solid var(--primary-color);
  min-width: 180px;
}

.btn-primary {
  background: var(--primary-color);
  color: white;
  border: none;
  box-shadow: 0 2px 8px rgba(0,51,102,0.2);
}

.btn-primary:hover {
  background: #004c99;
  transform: translateY(-2px);
  box-shadow: 0 8px 18px rgba(0,51,102,0.25);
}

.btn-danger {
  background: #c62828;
  color: white;
  border: none;
}

.btn-danger:hover {
  background: #b71c1c;
  transform: translateY(-2px);
}

.btn-outline {
  background: transparent;
  border: 1.5px solid var(--secondary-color);
  color: var(--secondary-color);
}

.btn-outline:hover {
  background: var(--secondary-color);
  color: white;
}

/* HISTÓRICO E PLANILHAS */
.history-section {
  background: var(--bg-white);
  border-radius: 24px;
  padding: 20px 0;
  margin-top: 20px;
}

.sheet-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  margin-bottom: 20px;
  border-bottom: 2px solid var(--border-light);
  padding-bottom: 12px;
}

.sheet-header h3 {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--primary-color);
}

/* planilha tabela */
.table-responsive {
  overflow-x: auto;
  border-radius: 16px;
}

.ponto-table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.ponto-table th {
  background: #f8fafc;
  padding: 14px 12px;
  text-align: center;
  font-weight: 600;
  color: var(--primary-color);
  border-bottom: 2px solid var(--border-light);
}

.ponto-table td {
  padding: 12px;
  text-align: center;
  border-bottom: 1px solid var(--border-light);
  color: #2c3e50;
}

.total-hours {
  background: #f1f9f0;
  padding: 12px 20px;
  border-radius: 60px;
  display: inline-block;
  margin-bottom: 18px;
  font-weight: 600;
  color: var(--accent-green);
  font-size: 1rem;
}

/* MODAL SOBREPOSIÇÃO (FINALIZAR DIA) */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(2px);
}

.modal-card {
  background: white;
  border-radius: 32px;
  max-width: 480px;
  width: 90%;
  padding: 32px 28px;
  text-align: center;
  box-shadow: 0 20px 35px rgba(0,0,0,0.2);
  position: relative;
}

.modal-card h3 {
  font-size: 1.8rem;
  color: var(--primary-color);
  margin-bottom: 20px;
}

.close-icon {
  position: absolute;
  top: 18px;
  right: 24px;
  font-size: 28px;
  cursor: pointer;
  color: #aaa;
  transition: 0.2s;
}
.close-icon:hover {
  color: var(--primary-color);
}

.comprovante-box {
  background: #f8f9fa;
  border-radius: 20px;
  padding: 20px;
  margin: 20px 0;
  text-align: left;
  font-family: monospace;
  font-size: 1rem;
  border-left: 5px solid var(--accent-green);
}

.comprovante-box p {
  margin: 8px 0;
}

.modal-footer {
  display: flex;
  gap: 15px;
  justify-content: center;
  margin-top: 20px;
}

/* PLANILHA DE MÊS ATUAL E ANTERIORES (EXPANDINDO PARA BAIXO) */
.sheet-panel {
  background: white;
  border-radius: 24px;
  margin-top: 30px;
  border: 1px solid var(--border-light);
  overflow: hidden;
}

.sheet-title {
  background: #f9fbfd;
  padding: 16px 24px;
  font-weight: 700;
  font-size: 1.2rem;
  color: var(--primary-color);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border-light);
  transition: 0.2s;
}

.sheet-title:hover {
  background: #f1f5f9;
}

.sheet-content {
  padding: 20px 24px;
  display: none;
  border-top: none;
}

.sheet-content.open {
  display: block;
}

.search-row {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: flex-end;
}

.search-row input, .search-row select {
  padding: 10px 14px;
  border: 1px solid #ced4da;
  border-radius: 40px;
  font-family: inherit;
  width: 130px;
  outline: none;
}

.search-row button {
  background: var(--secondary-color);
  border: none;
  padding: 10px 24px;
  border-radius: 40px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.search-row button:hover {
  background: var(--primary-color);
}

.download-btn {
  background: var(--accent-green);
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 40px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
  width: 100%;
  transition: 0.2s;
}

.download-btn:hover {
  background: #1b5e20;
}

/* Spinner na biometria */
.spinner-dots {
  display: inline-block;
  width: 32px;
  height: 32px;
  border: 4px solid rgba(0,51,102,0.2);
  border-top: 4px solid var(--primary-color);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 10px;
  vertical-align: middle;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.loading-text {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

/* Responsividade */
@media (max-width: 768px) {
  .header { padding: 0 20px; height: 70px; }
  .user-card { margin: 16px 20px 0 20px; flex-direction: column; text-align: center; padding: 20px; gap: 12px; }
  .user-info p { display: block; margin-right: 0; }
  .main-content { padding: 0 20px 30px 20px; }
  .cronometro { font-size: 48px; }
  .button-group { gap: 15px; }
  .btn { min-width: 140px; padding: 10px 18px; }
  .face-oval { width: 220px; height: 270px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo"></div>
  <div style="width: 40px;"></div> <!-- espaçamento -->
</header>

<!-- DADOS DA PESSOA - MODELO PROFISSIONAL COLADO AO CABEÇALHO -->
<div class="user-card">
  <img id="fotoPerfil" class="user-avatar" src="" alt="foto">
  <div class="user-info">
    <h2 id="nome">Carregando...</h2>
    <p><strong>NA:</strong> <span id="na"></span></p>
    <p><strong>Telefone:</strong> <span id="tel"></span></p>
  </div>
</div>

<div class="main-content">
  <!-- Área da câmera oval moderna -->
  <div class="camera-oval-container">
    <div id="faceOval" class="face-oval">
      <video id="videoFeed" autoplay muted></video>
    </div>
  </div>

  <!-- Temporizador -->
  <div class="timer-wrapper">
    <div class="cronometro" id="cronometroDisplay">00:00:00</div>
  </div>

  <!-- Botões principais -->
  <div class="button-group">
    <button id="iniciarPontoBtn" class="btn btn-primary">Iniciar Ponto</button>
    <button id="finalizarDiaBtn" class="btn btn-danger">Finalizar Dia</button>
  </div>

  <!-- PLANILHA MÊS ATUAL (expansível) -->
  <div class="sheet-panel">
    <div class="sheet-title" id="toggleMesAtual">
      📅 Histórico do Mês Atual <span>▼</span>
    </div>
    <div id="mesAtualContent" class="sheet-content">
      <div id="totalHorasAtual" class="total-hours"></div>
      <div class="table-responsive">
        <table class="ponto-table">
          <thead><tr><th>Data</th><th>Entrada</th><th>Saída</th><th>Duração</th></tr></thead>
          <tbody id="historicoAtualBody"><tr><td colspan="4">Carregando...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- PLANILHA MESES ANTERIORES (pesquisa e download) -->
  <div class="sheet-panel" style="margin-top: 20px;">
    <div class="sheet-title" id="toggleMesesAnt">
      📆 Ver Meses Anteriores <span>▼</span>
    </div>
    <div id="mesesAntContent" class="sheet-content">
      <div class="search-row">
        <input type="number" id="mesPesquisa" placeholder="Mês (1-12)" min="1" max="12">
        <input type="number" id="anoPesquisa" placeholder="Ano" value="2025">
        <button id="buscarMesBtn">Buscar</button>
      </div>
      <div id="totalHorasAnt" class="total-hours"></div>
      <div class="table-responsive">
        <table class="ponto-table">
          <thead><tr><th>Data</th><th>Entrada</th><th>Saída</th><th>Duração</th></tr></thead>
          <tbody id="historicoAntBody"><tr><td colspan="4">Selecione mês e ano</td></tr></tbody>
        </table>
      </div>
      <button id="downloadMesBtn" class="download-btn">📎 Baixar Comprovante (PDF)</button>
    </div>
  </div>
</div>

<!-- MODAL FINALIZAR DIA (comprovante) -->
<div id="finalizarModal" class="modal-overlay">
  <div class="modal-card">
    <span class="close-icon" onclick="fecharModalFinalizar()">✕</span>
    <h3>Comprovante do Dia</h3>
    <div id="comprovanteConteudo" class="comprovante-box"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="confirmarFinalizarBtn">Finalizar</button>
      <button class="btn btn-outline" onclick="fecharModalFinalizar()">Cancelar</button>
    </div>
  </div>
</div>

<!-- ALERTA SIMPLES -->
<div id="alertGlobal" class="modal-overlay" style="display:none;">
  <div class="modal-card" style="max-width: 320px;">
    <p id="alertMessage" style="margin: 20px 0; font-size: 1rem;"></p>
    <button onclick="fecharAlert()" class="btn btn-primary">OK</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBPiznHCVkTAgx6m02bZB8b0FFaot9UkBU",
  authDomain: "prefeitura-de-joao-camara.firebaseapp.com",
  projectId: "prefeitura-de-joao-camara",
  storageBucket: "prefeitura-de-joao-camara.firebasestorage.app",
  messagingSenderId: "269299041577",
  appId: "1:269299041577:web:fd41b2939240e9eb476338"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const serie = localStorage.getItem("usuarioAtual");
if(!serie) window.location.href = "login2.html";

// Elementos
const nomeSpan = document.getElementById("nome");
const naSpan = document.getElementById("na");
const telSpan = document.getElementById("tel");
const fotoImg = document.getElementById("fotoPerfil");
const cronometroEl = document.getElementById("cronometroDisplay");

let startTime = null;
let cronInterval = null;
let pontoAtivo = false;
let dadosUsuario = {};
let streamAtual = null;

// Carregar perfil
db.ref("usuarios/"+serie).on("value", snap => {
  if(snap.exists()){
    dadosUsuario = snap.val();
    nomeSpan.innerText = dadosUsuario.nome;
    naSpan.innerText = serie;
    telSpan.innerText = dadosUsuario.telefone || "não informado";
    fotoImg.src = dadosUsuario.foto || "";
  }
});

// Monitorar ponto ativo
db.ref("pontos/"+serie+"/ativo").on("value", s => {
  if(s.exists() && s.val().inicio){
    pontoAtivo = true;
    startTime = s.val().inicio;
    if(cronInterval) clearInterval(cronInterval);
    cronInterval = setInterval(updateCronometro, 1000);
  } else {
    pontoAtivo = false;
    clearInterval(cronInterval);
    cronometroEl.innerText = "00:00:00";
  }
});

function updateCronometro(){
  if(!startTime) return;
  const diff = Date.now() - startTime;
  const h = String(Math.floor(diff/3600000)).padStart(2,'0');
  const m = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
  const s = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  cronometroEl.innerText = `${h}:${m}:${s}`;
}

// CÂMERA OVAL E RECONHECIMENTO COM SPINNER
const faceOvalDiv = document.getElementById("faceOval");
const videoFeed = document.getElementById("videoFeed");

function iniciarCameraOval(){
  return new Promise((resolve, reject) => {
    if(streamAtual){
      streamAtual.getTracks().forEach(t => t.stop());
    }
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        streamAtual = stream;
        videoFeed.srcObject = stream;
        faceOvalDiv.style.display = "block";
        resolve();
      })
      .catch(err => reject(err));
  });
}

function pararCamera(){
  if(streamAtual){
    streamAtual.getTracks().forEach(t => t.stop());
    streamAtual = null;
  }
  faceOvalDiv.style.display = "none";
}

// Iniciar ponto com biometria + spinner 3 segundos
document.getElementById("iniciarPontoBtn").onclick = async () => {
  if(pontoAtivo){ mostrarAlerta("Ponto já está em andamento."); return; }
  try {
    await iniciarCameraOval();
    // Mostra spinner na tela e inicia contagem 3 segundos
    const btn = document.getElementById("iniciarPontoBtn");
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="loading-text"><span class="spinner-dots"></span> Realizando biometria...</span>';
    btn.disabled = true;
    
    await new Promise(resolve => setTimeout(resolve, 3000));
    
    // Finaliza biometria
    pararCamera();
    const agora = Date.now();
    await db.ref("pontos/"+serie+"/ativo").set({ inicio: agora });
    await db.ref("historico/"+serie+"/"+getDataAtual()+"/inicio").set(agora);
    btn.innerHTML = originalText;
    btn.disabled = false;
    mostrarAlerta("✅ Ponto iniciado com sucesso! Cronômetro ativo.");
  } catch(err){
    pararCamera();
    mostrarAlerta("Erro ao acessar câmera ou reconhecimento: " + err.message);
    document.getElementById("iniciarPontoBtn").innerHTML = "Iniciar Ponto";
    document.getElementById("iniciarPontoBtn").disabled = false;
  }
};

function getDataAtual(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// FINALIZAR DIA: mostra comprovante sobreposto
let dadosComprovanteTemp = null;
document.getElementById("finalizarDiaBtn").onclick = async () => {
  if(!pontoAtivo){ mostrarAlerta("Nenhum ponto em andamento."); return; }
  const hoje = getDataAtual();
  const snapInicio = await db.ref("historico/"+serie+"/"+hoje+"/inicio").once("value");
  const horaInicio = snapInicio.val() ? new Date(snapInicio.val()).toLocaleTimeString() : "--:--";
  const horaFimPrev = new Date().toLocaleTimeString();
  const comprovanteHtml = `
    <p><strong>Data:</strong> ${hoje}</p>
    <p><strong>Horário de início:</strong> ${horaInicio}</p>
    <p><strong>Horário de término (agora):</strong> ${horaFimPrev}</p>
    <p><strong>Total aproximado:</strong> ${cronometroEl.innerText}</p>
    <p>✅ Confirme para finalizar o ponto.</p>
  `;
  document.getElementById("comprovanteConteudo").innerHTML = comprovanteHtml;
  document.getElementById("finalizarModal").style.display = "flex";
  dadosComprovanteTemp = { data: hoje, inicio: snapInicio.val() };
};

window.fecharModalFinalizar = () => {
  document.getElementById("finalizarModal").style.display = "none";
};

document.getElementById("confirmarFinalizarBtn").onclick = async () => {
  const fim = Date.now();
  const hoje = getDataAtual();
  await db.ref("pontos/"+serie+"/ativo").remove();
  await db.ref("historico/"+serie+"/"+hoje+"/fim").set(fim);
  document.getElementById("finalizarModal").style.display = "none";
  mostrarAlerta("✅ Dia finalizado com sucesso! O comprovante foi registrado.");
};

// HISTÓRICO MÊS ATUAL (carregar sempre)
function carregarMesAtual(){
  const hoje = new Date();
  const mesAtual = hoje.getMonth()+1;
  const anoAtual = hoje.getFullYear();
  carregarHistoricoParaTabela(anoAtual, mesAtual, "historicoAtualBody", "totalHorasAtual");
}

// HISTÓRICO MÊS ANTERIOR (pesquisa)
document.getElementById("buscarMesBtn").onclick = () => {
  let mes = parseInt(document.getElementById("mesPesquisa").value);
  let ano = parseInt(document.getElementById("anoPesquisa").value);
  if(isNaN(mes) || mes<1 || mes>12) mes = new Date().getMonth()+1;
  if(isNaN(ano)) ano = new Date().getFullYear();
  carregarHistoricoParaTabela(ano, mes, "historicoAntBody", "totalHorasAnt");
};

function carregarHistoricoParaTabela(ano, mes, tbodyId, totalDivId){
  const tbody = document.getElementById(tbodyId);
  const totalDiv = document.getElementById(totalDivId);
  tbody.innerHTML = "<tr><td colspan='4'>Carregando...</td></tr>";
  db.ref("historico/"+serie).once("value").then(snap => {
    if(!snap.exists()){
      tbody.innerHTML = "<tr><td colspan='4'>Nenhum registro</td></tr>";
      totalDiv.innerHTML = "";
      return;
    }
    let totalMs = 0;
    const registros = [];
    const pontos = snap.val();
    Object.entries(pontos).forEach(([data, val]) => {
      const [yy, mm] = data.split("-").map(Number);
      if(yy === ano && mm === mes){
        const ini = val.inicio ? new Date(val.inicio).toLocaleTimeString() : "--";
        const fim = val.fim ? new Date(val.fim).toLocaleTimeString() : "--";
        let duracao = "--";
        if(val.inicio && val.fim){
          const diff = val.fim - val.inicio;
          totalMs += diff;
          const h = Math.floor(diff/3600000);
          const m = Math.floor((diff%3600000)/60000);
          duracao = `${h}h ${m}m`;
        }
        registros.push({ data, ini, fim, duracao });
      }
    });
    registros.sort((a,b)=>new Date(b.data)-new Date(a.data));
    if(registros.length === 0){
      tbody.innerHTML = "<tr><td colspan='4'>Nenhum ponto nesse período</td></tr>";
      totalDiv.innerHTML = "";
      return;
    }
    tbody.innerHTML = "";
    registros.forEach(r => {
      tbody.innerHTML += `<tr><td>${r.data}</td><td>${r.ini}</td><td>${r.fim}</td><td>${r.duracao}</td></tr>`;
    });
    const totalH = Math.floor(totalMs/3600000);
    const totalM = Math.floor((totalMs%3600000)/60000);
    totalDiv.innerHTML = `📊 Total de horas: ${totalH}h ${totalM}m`;
  }).catch(()=>{
    tbody.innerHTML = "<tr><td colspan='4'>Erro ao carregar</td></tr>";
  });
}

// Download PDF do mês pesquisado (meses anteriores)
document.getElementById("downloadMesBtn").onclick = async () => {
  let mes = parseInt(document.getElementById("mesPesquisa").value);
  let ano = parseInt(document.getElementById("anoPesquisa").value);
  if(isNaN(mes) || mes<1 || mes>12) mes = new Date().getMonth()+1;
  if(isNaN(ano)) ano = new Date().getFullYear();
  const snap = await db.ref("historico/"+serie).once("value");
  if(!snap.exists()){ mostrarAlerta("Nenhum dado para este período."); return; }
  const pontos = snap.val();
  const linhas = [];
  let totalMs = 0;
  Object.entries(pontos).forEach(([data, val]) => {
    const [yy, mm] = data.split("-").map(Number);
    if(yy === ano && mm === mes && val.inicio && val.fim){
      const ini = new Date(val.inicio).toLocaleTimeString();
      const fim = new Date(val.fim).toLocaleTimeString();
      const diff = val.fim - val.inicio;
      totalMs += diff;
      const h = Math.floor(diff/3600000);
      const m = Math.floor((diff%3600000)/60000);
      linhas.push([data, ini, fim, `${h}h ${m}m`]);
    }
  });
  if(linhas.length === 0){ mostrarAlerta("Sem registros completos para este mês."); return; }
  const totalH = Math.floor(totalMs/3600000);
  const totalM = Math.floor((totalMs%3600000)/60000);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text(`Comprovante de Horas - ${dadosUsuario.nome || serie}`, 14, 20);
  doc.setFontSize(11);
  doc.text(`Período: ${mes}/${ano}`, 14, 30);
  doc.text(`Total: ${totalH}h ${totalM}m`, 14, 38);
  doc.autoTable({
    startY: 45,
    head: [['Data', 'Entrada', 'Saída', 'Duração']],
    body: linhas,
    theme: 'striped',
    headStyles: { fillColor: [0,51,102] },
  });
  doc.save(`Comprovante_${serie}_${mes}_${ano}.pdf`);
  mostrarAlerta("Download do comprovante gerado!");
};

// Funções de UI
function mostrarAlerta(msg){
  document.getElementById("alertMessage").innerText = msg;
  document.getElementById("alertGlobal").style.display = "flex";
}
window.fecharAlert = function(){
  document.getElementById("alertGlobal").style.display = "none";
};

document.getElementById("toggleMesAtual").onclick = () => {
  const content = document.getElementById("mesAtualContent");
  content.classList.toggle("open");
};
document.getElementById("toggleMesesAnt").onclick = () => {
  const content = document.getElementById("mesesAntContent");
  content.classList.toggle("open");
};
// Inicialmente abrir mês atual e carregar
document.getElementById("mesAtualContent").classList.add("open");
carregarMesAtual();
