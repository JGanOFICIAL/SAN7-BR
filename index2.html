<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Ponto Mais · DomusFit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#fff;font-family:'Inter',sans-serif;color:#1e293b;min-height:100vh;display:flex;flex-direction:column;}
.app-header{position:sticky;top:0;width:100%;background:#fff;padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e9eef3;z-index:30;}
.back-btn{background:transparent;border:2px solid #2c6e2c;width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;color:#2c6e2c;}
.header-left{display:flex;align-items:center;gap:12px;}
.avatar-mini{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #2c6e2c;background:#f1f5f9;}
.header-title{font-weight:600;font-size:18px;color:#0f3b2c;}
.right-placeholder{width:40px;}
.main-dynamic{flex:1;display:flex;flex-direction:column;background:#fff;}

/* tela login */
.login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px;}
.avatar-circle{width:140px;height:140px;border-radius:50%;object-fit:cover;border:3px solid #e2e8f0;background:#f8fafc;}
.nome-bemvindo{font-size:26px;font-weight:600;color:#0f172a;}
.acessar-btn{background:#2c6e2c;border:none;padding:14px 42px;border-radius:60px;font-weight:600;font-size:18px;color:white;margin-top:20px;cursor:pointer;}

/* tres botoes empilhados */
.three-buttons-vertical{
  display:flex;
  flex-direction:column;
  gap:16px;
  padding:32px 20px;
  background:#fff;
}
.three-buttons-vertical button{
  background:transparent;
  border:2px solid #2c6e2c;
  border-radius:60px;
  padding:16px 20px;
  font-weight:600;
  font-size:16px;
  color:#1e293b;
  cursor:pointer;
  text-align:center;
}
.content-pane{flex:1;padding:24px 16px;background:#fff;}

/* bottom sheet */
.bottom-sheet{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-radius:28px 28px 0 0;
  box-shadow:0 -8px 30px rgba(0,0,0,0.15);
  transform:translateY(100%);
  transition:transform 0.25s ease-out;
  z-index:200;
  padding:24px 20px 32px;
  max-width:500px;
  margin:0 auto;
}
.bottom-sheet.open{transform:translateY(0);}
.sheet-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  z-index:199;
  visibility:hidden;
  opacity:0;
  transition:0.2s;
}
.sheet-overlay.open{visibility:visible;opacity:1;}
.sheet-title{font-weight:700;font-size:20px;margin-bottom:16px;}
.sheet-cronometro-mini{
  background:#fef2f2;
  padding:12px;
  border-radius:20px;
  text-align:center;
  margin:12px 0;
  font-weight:700;
  font-size:24px;
  font-family:monospace;
  color:#b91c1c;
}
.sheet-buttons{display:flex;gap:16px;margin-top:24px;}
.sheet-buttons button{flex:1;padding:14px;border-radius:60px;font-weight:600;border:none;}
.btn-sheet-cancel{background:#eef2ff;color:#1e293b;}
.btn-sheet-confirm{background:#2c6e2c;color:white;}

/* cronometro principal */
.cronometro-grande{
  font-size:52px;
  font-weight:700;
  text-align:center;
  font-feature-settings:"tnum";
  letter-spacing:2px;
  margin:20px 0;
  color:#0f3b2c;
}
.botoes-acao{
  display:flex;
  gap:16px;
  justify-content:center;
  margin:20px 0 32px;
}
.botoes-acao button{
  flex:1;
  padding:14px 0;
  border-radius:44px;
  font-weight:700;
  border:none;
  font-size:16px;
  cursor:pointer;
}
.btn-iniciar-ponto{background:#2c6e2c;color:white;}
.btn-finalizar-ponto{background:#b91c1c;color:white;display:none;}

/* filtro */
.filtro-mes{
  display:flex;
  gap:12px;
  margin:20px 0 12px;
}
.filtro-mes input{
  flex:1;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:20px;
  font-size:15px;
}
.filtro-mes button{
  background:#2c6e2c;
  border:none;
  padding:0 20px;
  border-radius:32px;
  font-weight:600;
  color:white;
}
.total-horas-card{
  background:#f0f9f0;
  padding:12px 16px;
  border-radius:24px;
  margin:8px 0 16px;
  display:flex;
  justify-content:space-between;
  font-weight:600;
}
.tabela-ponto{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
.tabela-ponto th, .tabela-ponto td{
  padding:12px 4px;
  border-bottom:1px solid #e2e8f0;
  text-align:center;
}
.tabela-ponto th{color:#2c6e2c;}

/* modal camera - QUADRADO SEM BORDAS ARREDONDADAS */
.modal-camera{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
  visibility:hidden;
  opacity:0;
  transition:0.1s;
}
.modal-camera.aberto{visibility:visible;opacity:1;}
.camera-quadrado{
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.camera-video-container{
  width:100%;
  flex:1;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}
.camera-video-container video{
  width:100%;
  height:auto;
  max-height:100%;
  object-fit:cover;
}
.modal-camera .botao-cancelar-camera{
  background:#e2e8f0;
  border:none;
  padding:16px;
  width:90%;
  margin:20px auto;
  border-radius:60px;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
}
.spinner-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
}
.spinner-bola{
  width:60px;
  height:60px;
  border:5px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.notif-toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  color:white;
  padding:8px 20px;
  border-radius:40px;
  z-index:999;
  font-size:14px;
}
</style>
</head>
<body>

<header class="app-header" id="appHeader" style="display:none;">
  <div class="header-left">
    <div class="back-btn" id="backBtn">←</div>
    <img class="avatar-mini" id="avatarMini" src="" alt="avatar" style="display:none;">
  </div>
  <div class="header-title" id="headerTitle">Ponto Mais</div>
  <div class="right-placeholder"></div>
</header>

<div class="main-dynamic" id="mainDynamic"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBPiznHCVkTAgx6m02bZB8b0FFaot9UkBU",
  authDomain: "prefeitura-de-joao-camara.firebaseapp.com",
  projectId: "prefeitura-de-joao-camara",
  storageBucket: "prefeitura-de-joao-camara.firebasestorage.app",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentUser = localStorage.getItem("usuarioAtual");
if(!currentUser) window.location.href = "login2.html";
let userData = {};
let pontoAtivo = false;
let pontoStart = null;
let cronInterval = null;
let currentViewStack = [];

const mainEl = document.getElementById("mainDynamic");
const headerEl = document.getElementById("appHeader");
const backBtn = document.getElementById("backBtn");
const headerTitleSpan = document.getElementById("headerTitle");
const avatarMini = document.getElementById("avatarMini");

function showMessage(msg){
  let t = document.createElement("div");
  t.className = "notif-toast";
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1800);
}
function formatDuration(ms){
  let h = Math.floor(ms/3600000);
  let m = Math.floor((ms%3600000)/60000);
  let s = Math.floor((ms%60000)/1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function getCronometroString(){
  if(pontoAtivo && pontoStart) return formatDuration(Date.now() - pontoStart);
  return "00:00:00";
}
function atualizaCronometroDisplay(){
  if(pontoAtivo && pontoStart && document.getElementById("cronodisplay")){
    document.getElementById("cronodisplay").innerText = formatDuration(Date.now() - pontoStart);
  }
}
function startCronometroLocal(){
  if(cronInterval) clearInterval(cronInterval);
  cronInterval = setInterval(()=>{
    if(pontoAtivo && pontoStart) atualizaCronometroDisplay();
    else if(!pontoAtivo && document.getElementById("cronodisplay")) document.getElementById("cronodisplay").innerText = "00:00:00";
    let sheetCrono = document.getElementById("sheetCronometro");
    if(sheetCrono && pontoAtivo && pontoStart) sheetCrono.innerText = formatDuration(Date.now() - pontoStart);
    else if(sheetCrono && !pontoAtivo) sheetCrono.innerText = "00:00:00";
  }, 1000);
}
function getDataChave(){
  let d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
db.ref("usuarios/"+currentUser).on("value", snap=>{ if(snap.exists()) userData = snap.val(); updateAvatarMini(); });
function updateAvatarMini(){
  if(userData.foto) avatarMini.src = userData.foto;
  else avatarMini.src = `https://ui-avatars.com/api/?background=2c6e2c&color=fff&name=${encodeURIComponent(userData.nome||'')}`;
  avatarMini.style.display = (currentViewStack.length>0 && currentViewStack[currentViewStack.length-1]!=='login') ? "block" : "none";
}

db.ref("pontos/"+currentUser+"/ativo/inicio").on("value", snap=>{
  let inicio = snap.val();
  if(inicio){
    pontoAtivo = true;
    pontoStart = inicio;
    startCronometroLocal();
    if(document.getElementById("cronodisplay")) atualizaCronometroDisplay();
    if(currentViewStack[currentViewStack.length-1] === 'tripode'){
      showPontoAbertoSheet();
    }
  } else {
    pontoAtivo = false;
    pontoStart = null;
    if(cronInterval) clearInterval(cronInterval);
    if(document.getElementById("cronodisplay")) document.getElementById("cronodisplay").innerText = "00:00:00";
  }
});

// bottom sheet generico
let activeSheetCallback = null;
let activeSheetCloseOnConfirm = true;
function showBottomSheet(title, message, confirmText, onConfirm, closeOnConfirm=true, showCronometro=false){
  let overlay = document.getElementById("sheetOverlay");
  let sheet = document.getElementById("bottomSheet");
  if(!overlay){
    let divOverlay = document.createElement("div");
    divOverlay.id="sheetOverlay"; divOverlay.className="sheet-overlay";
    let divSheet = document.createElement("div");
    divSheet.id="bottomSheet"; divSheet.className="bottom-sheet";
    divSheet.innerHTML = `<div class="sheet-title" id="sheetTitle"></div><div id="sheetMsg"></div><div class="sheet-cronometro-mini" id="sheetCronometro" style="display:none;">00:00:00</div><div class="sheet-buttons"><button class="btn-sheet-cancel" id="sheetCancelBtn">Cancelar</button><button class="btn-sheet-confirm" id="sheetConfirmBtn"></button></div>`;
    document.body.appendChild(divOverlay);
    document.body.appendChild(divSheet);
    overlay = divOverlay; sheet = divSheet;
    document.getElementById("sheetCancelBtn").onclick = ()=>{ closeBottomSheet(); };
    document.getElementById("sheetConfirmBtn").onclick = ()=>{ if(activeSheetCallback) activeSheetCallback(); if(activeSheetCloseOnConfirm) closeBottomSheet(); };
  }
  document.getElementById("sheetTitle").innerText = title;
  document.getElementById("sheetMsg").innerHTML = `<p style="margin:8px 0">${message}</p>`;
  document.getElementById("sheetConfirmBtn").innerText = confirmText;
  let cronoDiv = document.getElementById("sheetCronometro");
  if(showCronometro && pontoAtivo){
    cronoDiv.style.display = "block";
    cronoDiv.innerText = getCronometroString();
  } else {
    cronoDiv.style.display = "none";
  }
  activeSheetCallback = onConfirm;
  activeSheetCloseOnConfirm = closeOnConfirm;
  overlay.classList.add("open");
  sheet.classList.add("open");
}
function closeBottomSheet(){
  let overlay = document.getElementById("sheetOverlay");
  let sheet = document.getElementById("bottomSheet");
  if(overlay) overlay.classList.remove("open");
  if(sheet) sheet.classList.remove("open");
  activeSheetCallback = null;
}

function showPontoAbertoSheet(){
  let nomeFunc = userData.nome || 'Funcionario';
  showBottomSheet("Ponto em Andamento", `Ola, ${nomeFunc}! Voce ja possui um ponto aberto. Tempo atual:`, "Acessar Ponto", ()=>{ renderScreen('ponto', true); }, true, true);
}

function renderScreen(screenId, pushToStack=true){
  if(pushToStack) currentViewStack.push(screenId);
  headerEl.style.display = (screenId === 'login') ? 'none' : 'flex';
  updateAvatarMini();
  if(screenId === 'login') headerTitleSpan.innerText = '';
  else if(screenId === 'tripode') headerTitleSpan.innerText = 'Menu';
  else if(screenId === 'ponto') headerTitleSpan.innerText = 'Batida de Ponto';
  else if(screenId === 'carga') headerTitleSpan.innerText = 'Carga Horaria';
  else if(screenId === 'chamado') headerTitleSpan.innerText = 'Central de Chamados';
  if(screenId === 'login') telaLogin();
  else if(screenId === 'tripode') telaTripode();
  else if(screenId === 'ponto') telaPonto();
  else if(screenId === 'carga') telaCarga();
  else if(screenId === 'chamado') telaChamado();
}
function goBack(){
  if(currentViewStack.length <=1){ renderScreen('login',false); currentViewStack=['login']; }
  else { currentViewStack.pop(); renderScreen(currentViewStack[currentViewStack.length-1], false); }
}
backBtn.onclick = goBack;

// TELA LOGIN
function telaLogin(){
  mainEl.innerHTML = `<div class="login-screen"><img class="avatar-circle" id="loginAvatar" src="${userData.foto||''}" onerror="this.src='https://ui-avatars.com/api/?background=2c6e2c&color=fff&name=${encodeURIComponent(userData.nome||'User')}'"><div class="nome-bemvindo" id="loginNome">${userData.nome||'Carregando...'}</div><button class="acessar-btn" id="acessarPrincipalBtn">Acessar</button></div>`;
  if(userData.nome) document.getElementById("loginNome").innerText = userData.nome;
  db.ref("usuarios/"+currentUser).once("value").then(s=>{ if(s.exists()){ let d=s.val(); document.getElementById("loginAvatar").src = d.foto || `https://ui-avatars.com/api/?background=2c6e2c&color=fff&name=${encodeURIComponent(d.nome||'')}`; document.getElementById("loginNome").innerText = d.nome; } });
  document.getElementById("acessarPrincipalBtn").onclick = ()=> renderScreen('tripode', true);
}

function telaTripode(){
  mainEl.innerHTML = `<div class="three-buttons-vertical"><button id="btnPonto">Batida de Ponto</button><button id="btnCarga">Carga Horaria</button><button id="btnChamado">Abrir Chamado</button></div><div class="content-pane"><div style="text-align:center;margin-top:40px;color:#6c757d;">Selecione uma opcao</div></div>`;
  document.getElementById("btnPonto").onclick = ()=> renderScreen('ponto', true);
  document.getElementById("btnCarga").onclick = ()=> renderScreen('carga', true);
  document.getElementById("btnChamado").onclick = ()=> renderScreen('chamado', true);
  if(pontoAtivo){
    setTimeout(() => { showPontoAbertoSheet(); }, 200);
  }
}

// TELA PONTO
function telaPonto(){
  mainEl.innerHTML = `<div style="padding:24px 16px;"><div class="cronometro-grande" id="cronodisplay">00:00:00</div><div class="botoes-acao"><button class="btn-iniciar-ponto" id="iniciarPontoBtn">Iniciar Ponto</button><button class="btn-finalizar-ponto" id="finalizarPontoBtn">Finalizar Dia</button></div><div style="margin-top:30px;"><h4>Ultimos registros</h4><div id="miniResumo"></div></div></div>`;
  if(pontoAtivo) { document.getElementById("finalizarPontoBtn").style.display = "block"; document.getElementById("iniciarPontoBtn").style.display = "none"; atualizaCronometroDisplay(); }
  else { document.getElementById("finalizarPontoBtn").style.display = "none"; document.getElementById("iniciarPontoBtn").style.display = "block"; }
  startCronometroLocal();
  carregarMiniHistorico();
  document.getElementById("iniciarPontoBtn").onclick = ()=>{
    if(pontoAtivo){ showMessage("Ponto ja iniciado"); return; }
    showBottomSheet("Iniciar Ponto", "Realmente deseja iniciar o ponto?", "Sim, iniciar", ()=>{ abrirModalCamera(); });
  };
  document.getElementById("finalizarPontoBtn").onclick = ()=>{
    if(!pontoAtivo){ showMessage("Nenhum ponto ativo"); return; }
    showBottomSheet("Finalizar Expediente", "Finalizar o dia e encerrar o ponto?", "Sim, finalizar", ()=>{
      let fim = Date.now();
      db.ref("pontos/"+currentUser+"/ativo").remove();
      db.ref("historico/"+currentUser+"/"+getDataChave()+"/fim").set(fim);
      showMessage("Dia finalizado");
      document.getElementById("finalizarPontoBtn").style.display = "none";
      document.getElementById("iniciarPontoBtn").style.display = "block";
      if(document.getElementById("cronodisplay")) document.getElementById("cronodisplay").innerText = "00:00:00";
      carregarMiniHistorico();
    });
  };
}
async function carregarMiniHistorico(){
  let snap = await db.ref("historico/"+currentUser).once("value");
  let hist = snap.val()||{};
  let rows="";
  Object.entries(hist).slice(-5).reverse().forEach(([data,val])=>{
    let ini = val.inicio ? new Date(val.inicio).toLocaleTimeString().slice(0,5) : "--";
    let fim = val.fim ? new Date(val.fim).toLocaleTimeString().slice(0,5) : "--";
    rows += `<tr><td>${data}</td><td>${ini}</td><td>${fim}</td></tr>`;
  });
  document.getElementById("miniResumo").innerHTML = `<table class="tabela-ponto"><tr><th>Data</th><th>Entrada</th><th>Saida</th></tr>${rows||'<tr><td colspan="3">Nenhum registro</td></tr>'}</table>`;
}

// CÂMERA: QUADRADO DE CANTO A CANTO, 3 SEGUNDOS + BOLINHA 2 SEGUNDOS
let cameraStreamActive = null;
function abrirModalCamera(){
  let modalHtml = `
    <div id="modalCamera" class="modal-camera">
      <div class="camera-quadrado">
        <div class="camera-video-container">
          <video id="videoCam" autoplay playsinline></video>
        </div>
        <button class="botao-cancelar-camera" id="cancelarCameraBtn">Cancelar</button>
      </div>
    </div>
  `;
  if(document.getElementById("modalCamera")) document.getElementById("modalCamera").remove();
  document.body.insertAdjacentHTML('beforeend', modalHtml);
  let modal = document.getElementById("modalCamera");
  modal.classList.add("aberto");
  const video = document.getElementById("videoCam");
  navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}).then(stream=>{
    cameraStreamActive = stream;
    video.srcObject = stream;
    // 3 segundos de camera aberta
    setTimeout(()=>{
      if(cameraStreamActive) cameraStreamActive.getTracks().forEach(t=>t.stop());
      cameraStreamActive = null;
      video.srcObject = null;
      // remove video e mostra bolinha transparente
      let container = document.querySelector("#modalCamera .camera-video-container");
      if(container){
        container.innerHTML = '';
        let spinnerDiv = document.createElement("div");
        spinnerDiv.style.position = "absolute";
        spinnerDiv.style.inset = "0";
        spinnerDiv.style.display = "flex";
        spinnerDiv.style.alignItems = "center";
        spinnerDiv.style.justifyContent = "center";
        spinnerDiv.style.backgroundColor = "rgba(0,0,0,0.8)";
        let bola = document.createElement("div");
        bola.className = "spinner-bola";
        spinnerDiv.appendChild(bola);
        container.appendChild(spinnerDiv);
      }
      // bolinha gira por 2 segundos
      setTimeout(()=>{
        fecharModalCamera();
        let agora = Date.now();
        db.ref("pontos/"+currentUser+"/ativo").set({inicio: agora});
        db.ref("historico/"+currentUser+"/"+getDataChave()+"/inicio").set(agora);
        showMessage("Ponto iniciado");
        if(document.getElementById("cronodisplay")) atualizaCronometroDisplay();
        carregarMiniHistorico();
        if(document.getElementById("finalizarPontoBtn")) document.getElementById("finalizarPontoBtn").style.display = "block";
        if(document.getElementById("iniciarPontoBtn")) document.getElementById("iniciarPontoBtn").style.display = "none";
      }, 2000);
    }, 3000);
  }).catch(()=>{ fecharModalCamera(); showMessage("Permissao da camera negada"); });
  document.getElementById("cancelarCameraBtn").onclick = ()=>{ fecharModalCamera(); };
}
function fecharModalCamera(){
  let modal = document.getElementById("modalCamera");
  if(modal) modal.classList.remove("aberto");
  if(cameraStreamActive){ cameraStreamActive.getTracks().forEach(t=>t.stop()); cameraStreamActive=null; }
  setTimeout(()=>{ if(modal) modal.remove(); }, 100);
}

// CARGA HORARIA
function telaCarga(){
  mainEl.innerHTML = `<div style="padding:0 16px 20px;"><div class="filtro-mes"><input type="text" id="mesAnoInput" placeholder="MM/AAAA" maxlength="7"><button id="buscarCargaBtn">Buscar</button></div><div id="cargaResultado"></div></div>`;
  let input = document.getElementById("mesAnoInput");
  input.addEventListener("input", function(e){
    let val = e.target.value.replace(/\D/g,'');
    if(val.length>=2) val = val.slice(0,2)+'/'+val.slice(2,6);
    e.target.value = val;
  });
  document.getElementById("buscarCargaBtn").onclick = async()=>{
    let raw = input.value.trim();
    if(!raw.match(/^\d{2}\/\d{4}$/)){ showMessage("Formato MM/AAAA"); return; }
    let [mm,yyyy] = raw.split("/");
    let mes=parseInt(mm), ano=parseInt(yyyy);
    if(mes<1||mes>12||ano<2000){ showMessage("Mes ou ano invalido"); return; }
    let snap = await db.ref("historico/"+currentUser).once("value");
    let pontos = snap.val()||{};
    let totalMs=0, linhas="";
    let registros = Object.entries(pontos).filter(([data])=>{ let [y,m]=data.split("-").map(Number); return y===ano && m===mes; }).sort((a,b)=>b[0].localeCompare(a[0]));
    registros.forEach(([data,val])=>{
      let ini = val.inicio ? new Date(val.inicio).toLocaleTimeString().slice(0,5) : "--";
      let fim = val.fim ? new Date(val.fim).toLocaleTimeString().slice(0,5) : "--";
      let dur = "--";
      if(val.inicio && val.fim){
        let diff = val.fim - val.inicio;
        totalMs += diff;
        dur = `${Math.floor(diff/3600000)}h ${Math.floor((diff%3600000)/60000)}m`;
      }
      linhas += `<tr><td>${data}</td><td>${ini}</td><td>${fim}</td><td>${dur}</td></tr>`;
    });
    let totalH = Math.floor(totalMs/3600000);
    let totalM = Math.floor((totalMs%3600000)/60000);
    document.getElementById("cargaResultado").innerHTML = `<div class="total-horas-card"><span>Total ${mm}/${yyyy}</span><strong>${totalH}h ${totalM}m</strong></div><table class="tabela-ponto"><thead><tr><th>Data</th><th>Entrada</th><th>Saida</th><th>Duracao</th></tr></thead><tbody>${linhas||'<tr><td colspan="4">Nenhum registro</td></tr>'}</tbody></table>`;
  };
}

// CHAMADO
function telaChamado(){
  mainEl.innerHTML = `<div style="padding:20px 16px;"><div id="formChamadoArea"><h3 style="margin-bottom:20px;">Abrir Chamado</h3><div style="background:#f8fafc;padding:16px;border-radius:24px;margin-bottom:20px;"><p><strong>Nome:</strong> ${userData.nome || '--'}</p><p><strong>NA:</strong> ${currentUser}</p><p><strong>Telefone:</strong> ${userData.telefone || '--'}</p></div><label>Descreva o motivo do chamado (edicao de ponto, correcao):</label><textarea id="motivacaoTexto" rows="5" style="width:100%;margin:12px 0;padding:14px;border-radius:24px;border:1px solid #cbd5e1;font-family:inherit;"></textarea><button id="enviarChamadoFinalBtn" style="background:#2c6e2c;color:white;border:none;padding:14px;width:100%;border-radius:60px;font-weight:600;">Enviar para WhatsApp</button><div id="protocoloAviso" style="margin-top:16px;font-size:13px;color:#4b5563;"></div></div><button id="voltarDoChamadoBtn" style="margin-top:30px;background:#e2e8f0;border:none;padding:12px;border-radius:60px;width:100%;">Voltar</button></div>`;
  document.getElementById("enviarChamadoFinalBtn").onclick = async()=>{
    let motiv = document.getElementById("motivacaoTexto").value.trim();
    if(motiv.length < 5){ showMessage("Descreva o motivo com pelo menos 5 caracteres"); return; }
    let protocolo = Math.random().toString(36).substring(2,10).toUpperCase() + Date.now().toString(36).toUpperCase();
    let dataHora = new Date().toLocaleString("pt-BR");
    let chamadoData = { nome: userData.nome, na: currentUser, telefone: userData.telefone||"", motivacao: motiv, dataHoraEnvio: dataHora, protocolo: protocolo, timestamp: Date.now() };
    await db.ref("chamadosEdicao/"+currentUser).push(chamadoData);
    let mensagem = `CHAMADO DOMUSFIT\n\nNome: ${userData.nome || ''}\nNA: ${currentUser}\nTelefone: ${userData.telefone || ''}\nProtocolo: ${protocolo}\nData: ${dataHora}\n----------------------------------\nMensagem:\n${motiv}`;
    window.open(`https://wa.me/5584991778690?text=${encodeURIComponent(mensagem)}`, '_blank');
    document.getElementById("protocoloAviso").innerHTML = `Protocolo gerado: ${protocolo}. Enviado ao WhatsApp.`;
    document.getElementById("motivacaoTexto").value = '';
  };
  document.getElementById("voltarDoChamadoBtn").onclick = ()=> renderScreen('tripode', true);
}

renderScreen('login', false);
