<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>DomusFit · Acesso Corporativo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:#ffffff;
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  color:#1e293b;
}
.app-header{
  position:sticky;
  top:0;
  width:100%;
  background:#ffffff;
  padding:0 24px;
  height:68px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid #eef2f6;
  z-index:30;
}
.header-title{
  font-weight:700;
  font-size:22px;
  color:#0f2b1f;
  letter-spacing:-0.4px;
}
.header-avatar{
  width:44px;
  height:44px;
  border-radius:50%;
  object-fit:cover;
  background:#eef2f0;
  border:1.5px solid #2c6e2c;
  cursor:pointer;
}
.hero-section{
  width:100%;
  background:linear-gradient(110deg, #0a2a1c 0%, #1a4a30 100%);
  color:white;
  padding:56px 24px 72px;
  position:relative;
  overflow:hidden;
}
.hero-bg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image:url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80');
  background-size:cover;
  background-position:center 25%;
  opacity:0.15;
  mix-blend-mode:soft-light;
}
.hero-content{
  position:relative;
  z-index:2;
  text-align:center;
}
.hero-title{
  font-size:34px;
  font-weight:700;
  margin-bottom:12px;
  letter-spacing:-0.6px;
}
.hero-sub{
  font-size:16px;
  opacity:0.88;
  font-weight:400;
  max-width:280px;
  margin:0 auto;
}
.login-card{
  background:#ffffff;
  margin:-40px 20px 24px;
  border-radius:0px;
  box-shadow:0 24px 44px -16px rgba(0,0,0,0.12);
  padding:36px 28px;
  position:relative;
  z-index:5;
}
.input-moderno{
  width:100%;
  padding:18px 16px;
  font-size:17px;
  font-weight:500;
  border:1.5px solid #cbd5e1;
  background:#ffffff;
  font-family:'Inter',sans-serif;
  margin-bottom:24px;
  border-radius:0px;
  transition:0.2s;
}
.input-moderno:focus{
  outline:none;
  border-color:#2c6e2c;
}
.btn-acesso{
  width:100%;
  background:#2c6e2c;
  color:white;
  border:none;
  padding:16px 0;
  font-weight:600;
  font-size:17px;
  border-radius:0px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  transition:0.2s;
}
.btn-acesso:active{
  background:#1f4d1f;
  transform:scale(0.98);
}
.spinner-moderno{
  width:26px;
  height:26px;
  border:3px solid rgba(255,255,255,0.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.7s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.user-card-logado{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}
.user-avatar-lg{
  width:104px;
  height:104px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #2c6e2c;
  background:#f4f8f5;
}
.user-nome-lg{
  font-size:24px;
  font-weight:700;
  color:#0a2a1c;
}
.user-na{
  font-size:14px;
  color:#5a7268;
  background:#edf3f0;
  padding:8px 18px;
  font-family:monospace;
  letter-spacing:0.3px;
}
.logout-text{
  background:transparent;
  border:none;
  color:#b91c1c;
  font-weight:500;
  font-size:14px;
  margin-top:12px;
  cursor:pointer;
  text-decoration:underline;
}
.error-message{
  background:#fff6f0;
  color:#c2410c;
  padding:14px;
  font-size:14px;
  margin-bottom:24px;
  border-left:4px solid #c2410c;
  font-weight:500;
}
.app-footer{
  margin-top:auto;
  background:#fafcfb;
  padding:24px 24px 28px;
  border-top:1px solid #eef3f0;
}
.footer-inner{
  max-width:500px;
  margin:0 auto;
  text-align:center;
}
.lgpd-text{
  font-size:12px;
  color:#1e2a2a;
  line-height:1.45;
  margin-bottom:12px;
  font-weight:400;
  opacity:1;
}
.copyright{
  font-size:11px;
  color:#1e2a2a;
  opacity:0.7;
  margin-top:8px;
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-title">DomusFit</div>
  <img class="header-avatar" id="headerAvatar" src="" alt="perfil" style="display:none;">
</header>

<div class="hero-section">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-title">Funcionário</div>
    <div class="hero-sub">Acesse sua rotina de ponto</div>
  </div>
</div>

<div class="login-card" id="dynamicCard">
  <!-- conteudo dinamico -->
</div>

<footer class="app-footer">
  <div class="footer-inner">
    <div class="lgpd-text">
      De acordo com a Lei Geral de Protecao de Dados (LGPD), seus dados sao tratados com confidencialidade e usados exclusivamente para gestao de ponto e frequencia.
    </div>
    <div class="copyright">DomusFit · Todos os direitos reservados 2026</div>
  </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBPiznHCVkTAgx6m02bZB8b0FFaot9UkBU",
  authDomain: "prefeitura-de-joao-camara.firebaseapp.com",
  projectId: "prefeitura-de-joao-camara",
  storageBucket: "prefeitura-de-joao-camara.firebasestorage.app",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentSerial = localStorage.getItem("usuarioAtual");
const cardDiv = document.getElementById("dynamicCard");
const headerAvatar = document.getElementById("headerAvatar");

function updateHeaderAvatar(url){
  if(url && url !== ""){
    headerAvatar.style.display = "block";
    headerAvatar.src = url;
  } else {
    headerAvatar.style.display = "none";
  }
}

function showError(msg, isLoggedInMode=false){
  const errorHtml = `<div class="error-message">${msg}</div>`;
  if(isLoggedInMode){
    const btnHtml = `<button class="logout-text" id="logoutFromError">Sair da conta</button>`;
    cardDiv.innerHTML = errorHtml + btnHtml;
    document.getElementById("logoutFromError")?.addEventListener("click",()=>{
      localStorage.removeItem("usuarioAtual");
      window.location.reload();
    });
    setTimeout(()=>{ if(currentSerial) renderLoggedIn(); else renderLoginForm(); }, 2000);
  } else {
    cardDiv.innerHTML = errorHtml;
    setTimeout(()=>{ renderLoginForm(); }, 1800);
  }
}

function renderLoginForm(){
  cardDiv.innerHTML = `
    <input type="text" id="naLoginInput" class="input-moderno" placeholder="Numero de registro (NA)" autocomplete="off">
    <button id="loginActionBtn" class="btn-acesso">Acessar plataforma</button>
  `;
  const btn = document.getElementById("loginActionBtn");
  const inputNa = document.getElementById("naLoginInput");
  btn.onclick = async () => {
    const na = inputNa.value.trim();
    if(!na){ showError("Informe o NA cadastrado", false); return; }
    const originalHtml = btn.innerHTML;
    btn.innerHTML = '<div class="spinner-moderno"></div> Validando';
    btn.disabled = true;
    const userSnap = await db.ref("usuarios/"+na).once("value");
    if(userSnap.exists()){
      localStorage.setItem("usuarioAtual", na);
      currentSerial = na;
      window.location.href = "index2.html";
    } else {
      btn.innerHTML = originalHtml;
      btn.disabled = false;
      showError("NA nao encontrado. Verifique seu numero de serie.", false);
    }
  };
}

function renderLoggedIn(){
  if(!currentSerial){ renderLoginForm(); return; }
  db.ref("usuarios/"+currentSerial).once("value").then(snap => {
    if(snap.exists()){
      const user = snap.val();
      const foto = user.foto || "";
      const nome = user.nome || "Colaborador";
      const naExibido = currentSerial;
      updateHeaderAvatar(foto);
      cardDiv.innerHTML = `
        <div class="user-card-logado">
          <img class="user-avatar-lg" src="${foto}" onerror="this.src='https://ui-avatars.com/api/?background=2c6e2c&color=fff&name=${encodeURIComponent(nome)}'">
          <div class="user-nome-lg">${nome}</div>
          <div class="user-na">NA: ${naExibido}</div>
          <button id="continueAccessBtn" class="btn-acesso">Acessar painel</button>
          <button id="switchAccountBtn" class="logout-text">Trocar conta</button>
        </div>
      `;
      document.getElementById("continueAccessBtn").onclick = () => {
        window.location.href = "index2.html";
      };
      document.getElementById("switchAccountBtn").onclick = () => {
        localStorage.removeItem("usuarioAtual");
        currentSerial = null;
        updateHeaderAvatar("");
        renderLoginForm();
      };
    } else {
      localStorage.removeItem("usuarioAtual");
      currentSerial = null;
      renderLoginForm();
    }
  }).catch(()=>{ renderLoginForm(); });
}

if(currentSerial){
  renderLoggedIn();
} else {
  renderLoginForm();
}
</script>
</body>
</html>
