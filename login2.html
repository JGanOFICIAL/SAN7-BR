<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DomusFit • Acesso Restrito</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER QUADRADO E FIXO */
        header {
            height: 80px;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #E5E7EB;
            background: #FFFFFF;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            width: 160px;
            height: 44px;
            background: url('https://c2a6771173.cbaul-cdnwnd.com/4f0c8b93cda84ae8665e2b589652cf30/200000083-d9fb4d9fb6/700/3F36BE85-5E12-4237-844C-9BD82571F2C4.webp') no-repeat center left;
            background-size: contain;
        }

        .menu-square {
            width: 44px;
            height: 44px;
            background: #F3F4F6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
        }

        /* NOTIFICAÇÃO */
        .notification-bar {
            background: #0A192F;
            color: #FFFFFF;
            text-align: center;
            padding: 14px;
            font-size: 0.9rem;
            font-weight: 500;
            border-bottom: 1px solid #1E2A3A;
            transition: opacity 0.4s;
        }

        .notification-bar span {
            color: #FFD700;
            font-weight: 600;
        }

        .hidden-notification {
            opacity: 0;
            height: 0;
            padding: 0;
            overflow: hidden;
        }

        /* CONTEÚDO PRINCIPAL */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px;
        }

        /* CARD DE LOGIN - MINIMALISTA */
        .login-box {
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #111827;
            margin-bottom: 8px;
        }

        .login-box .subtitle {
            color: #6B7280;
            font-size: 0.9rem;
            margin-bottom: 40px;
            border-left: 3px solid #FFD700;
            padding-left: 16px;
        }

        /* INPUT QUADRADO */
        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9CA3AF;
            margin-bottom: 8px;
        }

        .na-input {
            width: 100%;
            height: 70px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 0 20px;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-align: center;
            background: #FFFFFF;
            color: #111827;
            outline: none;
        }

        .na-input:focus {
            border-color: #0A192F;
        }

        .na-input::placeholder {
            color: #E5E7EB;
            font-weight: 400;
            font-size: 1.5rem;
            letter-spacing: 4px;
        }

        /* CHECKBOX */
        .remember-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 24px 0 32px;
        }

        .remember-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            border: 1px solid #D1D5DB;
            border-radius: 4px;
            accent-color: #0A192F;
        }

        .remember-row label {
            color: #4B5563;
            font-size: 0.9rem;
        }

        /* BOTÃO QUADRADO */
        .btn-square {
            width: 100%;
            height: 60px;
            background: #0A192F;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-square:hover {
            background: #112240;
        }

        /* TIMELINE VIEW */
        #timeline-view {
            display: none;
            width: 100%;
            max-width: 400px;
        }

        .timeline-container {
            background: #FFFFFF;
            border: 1px solid #F3F4F6;
            border-radius: 8px;
            padding: 32px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .step-number {
            width: 36px;
            height: 36px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #9CA3AF;
            background: #FFFFFF;
        }

        .step.active .step-number {
            background: #0A192F;
            border-color: #0A192F;
            color: white;
        }

        .step.done .step-number {
            background: #059669;
            border-color: #059669;
            color: white;
        }

        .step.error .step-number {
            background: #DC2626;
            border-color: #DC2626;
            color: white;
        }

        .step-label {
            font-weight: 500;
            color: #1F2937;
        }

        /* TERMO EM PRETO */
        .termo-texto {
            background: #F9FAFB;
            padding: 24px;
            border-radius: 8px;
            margin: 24px 0;
            border: 1px solid #E5E7EB;
        }

        .termo-texto p {
            color: #111827;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .termo-texto strong {
            color: #0A192F;
        }

        .protocolo-box {
            font-family: monospace;
            background: #FFFFFF;
            padding: 12px 16px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #1F2937;
            margin-top: 16px;
        }

        /* PERMISSÃO LOCALIZAÇÃO */
        .geo-box {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .geo-box p {
            color: #374151;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        .btn-geo {
            background: #FFFFFF;
            border: 1px solid #0A192F;
            color: #0A192F;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .btn-geo:hover {
            background: #F3F4F6;
        }

        /* BOTÕES DE AÇÃO */
        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-secondary {
            flex: 1;
            height: 50px;
            background: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            font-weight: 600;
            color: #374151;
            cursor: pointer;
        }

        .btn-primary {
            flex: 1;
            height: 50px;
            background: #0A192F;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        .btn-primary:disabled {
            background: #E5E7EB;
            cursor: not-allowed;
        }

        .status-error {
            background: #FEE2E2;
            border: 1px solid #FECACA;
            color: #B91C1C;
            padding: 12px;
            border-radius: 8px;
            margin: 16px 0;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

<header>
    <div class="logo"></div>
    <div class="menu-square">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </div>
</header>

<div id="notification" class="notification-bar">
    A partir de agora, <span>históricos de autenticação</span> e <span>geolocalização</span> serão registrados.
</div>

<main class="main-container">
    <!-- TELA DE LOGIN -->
    <div id="login-view" class="login-box">
        <h2>Acesso restrito</h2>
        <div class="subtitle">Funcionários • 5 dígitos</div>

        <div class="input-group">
            <label>NÚMERO DE AUTENTICAÇÃO (NA)</label>
            <input type="text" id="serie" maxlength="5" placeholder="·····" class="na-input" inputmode="numeric" pattern="\d*">
        </div>

        <div class="remember-row">
            <input type="checkbox" id="remember" checked>
            <label for="remember">Lembrar neste dispositivo</label>
        </div>

        <button class="btn-square" id="btnEntrar">
            <span>ACESSAR SISTEMA</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        </button>
    </div>

    <!-- TELA PÓS-LOGIN -->
    <div id="timeline-view">
        <div class="timeline-container">
            <div class="step" id="s1">
                <div class="step-number">1</div>
                <div class="step-label">Validando credenciais</div>
            </div>
            <div class="step" id="s2">
                <div class="step-number">2</div>
                <div class="step-label">Obtendo localização</div>
            </div>
            <div class="step" id="s3">
                <div class="step-number">3</div>
                <div class="step-label">Gerando protocolo</div>
            </div>

            <!-- ÁREA DO TERMO (TEXTO PRETO) -->
            <div id="termoArea" style="display: none;">
                <div class="termo-texto" id="termoConteudo"></div>
                <div class="protocolo-box" id="protocoloDisplay"></div>
            </div>

            <!-- PERMISSÃO DE LOCALIZAÇÃO -->
            <div id="geoBox" class="geo-box" style="display: none;">
                <p>📍 Para acessar o sistema, é necessário permitir a localização em tempo real.</p>
                <button class="btn-geo" id="requestGeoBtn">Permitir localização</button>
            </div>

            <!-- MENSAGEM DE ERRO -->
            <div id="errorMsg" class="status-error" style="display: none;"></div>

            <!-- BOTÕES -->
            <div class="action-row">
                <button class="btn-secondary" id="btnBack" style="display: none;">VOLTAR</button>
                <button class="btn-primary" id="btnGo" style="display: none;">CONTINUAR</button>
            </div>
        </div>
    </div>
</main>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // Config Firebase (mantida)
    const firebaseConfig = {
        apiKey: "AIzaSyBPiznHCVkTAgx6m02bZB8b0FFaot9UkBU",
        authDomain: "prefeitura-de-joao-camara.firebaseapp.com",
        databaseURL: "https://prefeitura-de-joao-camara-default-rtdb.firebaseio.com",
        projectId: "prefeitura-de-joao-camara",
        storageBucket: "prefeitura-de-joao-camara.firebasestorage.app",
        messagingSenderId: "269299041577",
        appId: "1:269299041577:web:fd41b2939240e9eb476338"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Elementos
    const notification = document.getElementById('notification');
    const loginView = document.getElementById('login-view');
    const timelineView = document.getElementById('timeline-view');
    const btnEntrar = document.getElementById('btnEntrar');
    const serieInput = document.getElementById('serie');
    const btnBack = document.getElementById('btnBack');
    const btnGo = document.getElementById('btnGo');
    const errorMsg = document.getElementById('errorMsg');
    const termoArea = document.getElementById('termoArea');
    const termoConteudo = document.getElementById('termoConteudo');
    const protocoloDisplay = document.getElementById('protocoloDisplay');
    const geoBox = document.getElementById('geoBox');

    // Estado
    let geoPermitida = false;
    let coords = null;
    let userId = '';
    let userNome = '';

    // Notificação some após 2s
    setTimeout(() => {
        notification.classList.add('hidden-notification');
    }, 2000);

    // Login
    btnEntrar.addEventListener('click', () => {
        const serie = serieInput.value.trim();
        if (!/^\d{5}$/.test(serie)) {
            alert('Digite os 5 dígitos do NA');
            return;
        }

        loginView.style.display = 'none';
        timelineView.style.display = 'block';
        resetFlow();
        iniciarAutenticacao(serie);
    });

    function resetFlow() {
        document.querySelectorAll('.step').forEach(s => {
            s.classList.remove('active', 'done', 'error');
            const num = s.querySelector('.step-number');
            if (s.id === 's1') num.textContent = '1';
            if (s.id === 's2') num.textContent = '2';
            if (s.id === 's3') num.textContent = '3';
        });
        errorMsg.style.display = 'none';
        btnGo.style.display = 'none';
        btnBack.style.display = 'none';
        termoArea.style.display = 'none';
        geoBox.style.display = 'none';
        geoPermitida = false;
    }

    function setStepStatus(id, status) {
        const step = document.getElementById(id);
        step.classList.remove('active', 'done', 'error');
        step.classList.add(status);
        if (status === 'done') {
            step.querySelector('.step-number').textContent = '✓';
        }
    }

    function iniciarAutenticacao(serie) {
        setStepStatus('s1', 'active');
        userId = serie;

        setTimeout(() => {
            db.ref('usuarios/' + serie).once('value').then(snap => {
                if (snap.exists()) {
                    userNome = snap.val().nome || 'Funcionário';
                    setStepStatus('s1', 'done');
                    setStepStatus('s2', 'active');
                    solicitarLocalizacao();
                } else {
                    falharAutenticacao('NA não reconhecido.');
                }
            }).catch(() => {
                falharAutenticacao('Erro de conexão.');
            });
        }, 1000);
    }

    function solicitarLocalizacao() {
        if (!navigator.geolocation) {
            mostrarGeoBox();
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                geoPermitida = true;
                coords = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy
                };
                setStepStatus('s2', 'done');
                setStepStatus('s3', 'active');
                gerarTermoEProtocolo();
            },
            (err) => {
                console.log('Geo error:', err);
                mostrarGeoBox();
            },
            { enableHighAccuracy: true, timeout: 8000 }
        );
    }

    function mostrarGeoBox() {
        geoBox.style.display = 'block';
        document.getElementById('requestGeoBtn').onclick = () => {
            geoBox.style.display = 'none';
            solicitarLocalizacao();
        };
    }

    function gerarTermoEProtocolo() {
        setTimeout(() => {
            const protocolo = 'NA-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substring(2,6).toUpperCase();
            const dataHora = new Date().toLocaleString('pt-BR', { 
                day: '2-digit', month: '2-digit', year: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            });

            // TERMO EM TEXTO PRETO (3-4 linhas)
            const termo = `Eu, ${userNome}, portador do NA ${userId}, declaro que em ${dataHora} acessei o sistema DomusFit.\n` +
                         `Localização: latitude ${coords.lat.toFixed(4)}, longitude ${coords.lng.toFixed(4)}.\n` +
                         `Este acesso está registrado sob protocolo ${protocolo}.`;

            termoConteudo.innerHTML = termo.replace(/\n/g, '<br>');
            protocoloDisplay.textContent = `Protocolo: ${protocolo}`;
            termoArea.style.display = 'block';
            setStepStatus('s3', 'done');

            // Salvar log no Firebase
            db.ref('logs_acesso').push({
                usuarioId: userId,
                nome: userNome,
                protocolo: protocolo,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                dataHora: dataHora,
                localizacao: coords,
                userAgent: navigator.userAgent
            });

            btnGo.style.display = 'block';
            btnBack.style.display = 'block';
        }, 1200);
    }

    function falharAutenticacao(msg) {
        setStepStatus('s1', 'error');
        setStepStatus('s2', 'error');
        setStepStatus('s3', 'error');
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
        btnBack.style.display = 'block';
    }

    btnBack.addEventListener('click', () => {
        timelineView.style.display = 'none';
        loginView.style.display = 'block';
        serieInput.value = '';
    });

    btnGo.addEventListener('click', () => {
        window.location.href = 'index2.html';
    });
</script>

<!-- ARQUIVO DE SEGURANÇA -->
<script src="san7doc.acesso-seguro.js" defer></script>

</body>
</html>
