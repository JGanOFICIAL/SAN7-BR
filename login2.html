<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DomusFit • Acesso Restrito</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER LIMPO E MINIMALISTA */
        header {
            height: 70px;
            padding: 0 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f0f0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            width: 150px;
            height: 40px;
            background: url('https://c2a6771173.cbaul-cdnwnd.com/4f0c8b93cda84ae8665e2b589652cf30/200000083-d9fb4d9fb6/700/3F36BE85-5E12-4237-844C-9BD82571F2C4.webp') no-repeat center left;
            background-size: contain;
        }

        .menu-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
        }

        /* NOTIFICAÇÃO INICIAL (some após 2s) */
        .notification-bar {
            background: #0A192F;
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: opacity 0.5s ease;
        }

        .notification-bar span {
            color: #FFD700;
            font-weight: 600;
        }

        .hidden-notification {
            opacity: 0;
            pointer-events: none;
            height: 0;
            padding: 0;
        }

        /* CONTEÚDO PRINCIPAL */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
            transition: all 0.2s;
        }

        .login-card h2 {
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #0A192F;
        }

        .login-card .sub {
            color: #6B7280;
            font-size: 0.9rem;
            margin-bottom: 30px;
            border-left: 3px solid #FFD700;
            padding-left: 12px;
        }

        /* INPUT REDONDO E MINIMALISTA */
        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #9CA3AF;
            margin-bottom: 6px;
        }

        .pin-input {
            width: 100%;
            padding: 20px 20px;
            border: 1.5px solid #E5E7EB;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 12px;
            background: #F9FAFB;
            transition: 0.2s;
            color: #111827;
            outline: none;
        }

        .pin-input:focus {
            border-color: #0A192F;
            background: white;
            box-shadow: 0 0 0 4px rgba(10,25,47,0.05);
        }

        /* teclado numérico no celular */
        .pin-input[type="text"] {
            -webkit-text-security: disc;
        }

        .checkbox-line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 25px 0 30px;
        }

        .checkbox-line input {
            width: 18px;
            height: 18px;
            accent-color: #0A192F;
        }

        .checkbox-line label {
            color: #4B5563;
            font-size: 0.9rem;
        }

        .btn-primary {
            width: 100%;
            background: #0A192F;
            color: white;
            border: none;
            padding: 20px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(10,25,47,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #112240;
            transform: scale(1.01);
        }

        /* ÁREA DE TIMELINE E DECLARAÇÃO */
        #timeline-view {
            display: none;
            width: 100%;
            max-width: 440px;
        }

        .timeline-steps {
            background: white;
            border-radius: 28px;
            padding: 30px;
            border: 1px solid #f0f0f0;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 24px;
        }

        .step-badge {
            width: 42px;
            height: 42px;
            border-radius: 42px;
            background: #F3F4F6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #6B7280;
            transition: 0.2s;
        }

        .step-item.active .step-badge {
            background: #0A192F;
            color: white;
            box-shadow: 0 0 0 4px rgba(10,25,47,0.1);
        }

        .step-item.done .step-badge {
            background: #059669;
            color: white;
        }

        .step-item.error .step-badge {
            background: #DC2626;
            color: white;
        }

        .step-label {
            font-weight: 500;
            color: #1F2937;
        }

        /* TERMO DE DECLARAÇÃO (DOC) */
        .declaration-doc {
            background: #F9FAFB;
            border-radius: 20px;
            padding: 20px;
            margin: 24px 0 20px;
            font-size: 0.85rem;
            color: #1F2937;
            border-left: 3px solid #0A192F;
            line-height: 1.6;
        }

        .declaration-doc strong {
            color: #0A192F;
        }

        .protocolo {
            background: white;
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px dashed #0A192F;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 10px;
            font-family: monospace;
        }

        /* BOTÕES DE AÇÃO */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-outline {
            flex: 1;
            background: transparent;
            border: 1.5px solid #E5E7EB;
            padding: 16px;
            border-radius: 60px;
            font-weight: 600;
            color: #374151;
            cursor: pointer;
        }

        .btn-success {
            flex: 1;
            background: #0A192F;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        /* LOCALIZAÇÃO PERMISSÃO */
        .geo-permission-box {
            background: #F3F4F6;
            border-radius: 18px;
            padding: 18px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid #E5E7EB;
        }

        .geo-permission-box p {
            font-size: 0.85rem;
            color: #4B5563;
            margin-bottom: 12px;
        }

        .btn-geo {
            background: white;
            border: 1px solid #0A192F;
            color: #0A192F;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="logo"></div>
    <div class="menu-icon">⚲</div>
</header>

<!-- NOTIFICAÇÃO INICIAL (some 2s) -->
<div id="notification" class="notification-bar">
    ⚠️ A partir de agora, <span>históricos de autenticação</span> e <span>geolocalização</span> serão registrados.
</div>

<main class="main-content">
    <!-- TELA DE LOGIN -->
    <div id="login-view" class="login-card">
        <h2>Acesso restrito</h2>
        <div class="sub">funcionários • 5 dígitos</div>

        <div class="input-group">
            <label>ID de autenticação</label>
            <input type="text" id="serie" maxlength="5" placeholder="·····" class="pin-input" inputmode="numeric" pattern="\d*">
        </div>

        <div class="checkbox-line">
            <input type="checkbox" id="remember" checked>
            <label for="remember">Manter sessão neste dispositivo</label>
        </div>

        <button class="btn-primary" id="btnEntrar">
            <span>Validar acesso</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
    </div>

    <!-- TIMELINE + DECLARAÇÃO + PROTOCOLO -->
    <div id="timeline-view">
        <div class="timeline-steps">
            <div class="step-item" id="s1">
                <div class="step-badge">1</div>
                <div class="step-label">Validando chave</div>
            </div>
            <div class="step-item" id="s2">
                <div class="step-badge">2</div>
                <div class="step-label">Verificando localização</div>
            </div>
            <div class="step-item" id="s3">
                <div class="step-badge">3</div>
                <div class="step-label">Gerando protocolo</div>
            </div>

            <!-- ÁREA DA DECLARAÇÃO (DOC) -->
            <div id="declarationArea" style="display: none;">
                <div class="declaration-doc" id="docText"></div>
                <div class="protocolo" id="protocoloDisplay"></div>
            </div>

            <!-- PERMISSÃO DE LOCALIZAÇÃO (se negado) -->
            <div id="geoPermissionBox" class="geo-permission-box" style="display: none;">
                <p>🌍 Para acessar o sistema, é necessário permitir a localização em tempo real.</p>
                <button class="btn-geo" id="requestGeoBtn">Permitir localização</button>
            </div>

            <!-- MENSAGEM DE ERRO -->
            <div id="statusMsg" style="background:#FEE2E2; color:#B91C1C; padding:12px; border-radius:50px; margin:15px 0; text-align:center; display:none;"></div>

            <!-- BOTÕES -->
            <div class="action-buttons">
                <button class="btn-outline" id="btnBack" style="display: none;">↻ Voltar</button>
                <button class="btn-success" id="btnGo" style="display: none;">Continuar →</button>
            </div>
        </div>
    </div>
</main>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // FIREBASE (config mantida)
    const firebaseConfig = {
        apiKey: "AIzaSyBPiznHCVkTAgx6m02bZB8b0FFaot9UkBU",
        authDomain: "prefeitura-de-joao-camara.firebaseapp.com",
        databaseURL: "https://prefeitura-de-joao-camara-default-rtdb.firebaseio.com",
        projectId: "prefeitura-de-joao-camara",
        storageBucket: "prefeitura-de-joao-camara.firebasestorage.app",
        messagingSenderId: "269299041577",
        appId: "1:269299041577:web:fd41b2939240e9eb476338"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Elementos DOM
    const notification = document.getElementById('notification');
    const loginView = document.getElementById('login-view');
    const timelineView = document.getElementById('timeline-view');
    const btnEntrar = document.getElementById('btnEntrar');
    const serieInput = document.getElementById('serie');
    const btnBack = document.getElementById('btnBack');
    const btnGo = document.getElementById('btnGo');
    const statusMsg = document.getElementById('statusMsg');
    const declarationArea = document.getElementById('declarationArea');
    const docText = document.getElementById('docText');
    const protocoloDisplay = document.getElementById('protocoloDisplay');
    const geoBox = document.getElementById('geoPermissionBox');

    // estado da localização
    let geoPermitida = false;
    let coordsAtuais = null;
    let userId = '';
    let userNome = '';

    // notificação some após 2 segundos
    setTimeout(() => {
        notification.classList.add('hidden-notification');
    }, 2000);

    // EVENTO LOGIN
    btnEntrar.addEventListener('click', () => {
        const serie = serieInput.value.trim();
        if (!/^\d{5}$/.test(serie)) {
            alert('Digite exatamente 5 dígitos numéricos');
            return;
        }

        // Troca para timeline
        loginView.style.display = 'none';
        timelineView.style.display = 'block';
        resetFlow();
        startAuth(serie);
    });

    function resetFlow() {
        document.querySelectorAll('.step-item').forEach(s => {
            s.classList.remove('active', 'done', 'error');
            s.querySelector('.step-badge').innerHTML = s.id.replace('s','');
        });
        statusMsg.style.display = 'none';
        btnGo.style.display = 'none';
        btnBack.style.display = 'none';
        declarationArea.style.display = 'none';
        geoBox.style.display = 'none';
        geoPermitida = false;
    }

    function setStep(id, state) {
        const el = document.getElementById(id);
        if (state === 'active') el.classList.add('active');
        else if (state === 'done') {
            el.classList.remove('active');
            el.classList.add('done');
            el.querySelector('.step-badge').innerHTML = '✓';
        } else if (state === 'error') {
            el.classList.add('error');
            el.querySelector('.step-badge').innerHTML = '✕';
        }
    }

    // INÍCIO DO FLUXO DE AUTENTICAÇÃO
    function startAuth(serie) {
        setStep('s1', 'active');
        userId = serie;

        // step 1: verificar no firebase
        setTimeout(() => {
            db.ref('usuarios/' + serie).once('value').then(snap => {
                if (snap.exists()) {
                    const userData = snap.val();
                    userNome = userData.nome || 'Funcionário';
                    setStep('s1', 'done');
                    // parte 2: geolocalização
                    setStep('s2', 'active');
                    solicitarGeolocalizacao();
                } else {
                    erroAutenticacao('Chave não reconhecida.');
                }
            }).catch(e => erroAutenticacao('Erro de conexão.'));
        }, 800);
    }

    function solicitarGeolocalizacao() {
        if (!navigator.geolocation) {
            mostrarBotaoGeo();
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                // sucesso
                geoPermitida = true;
                coordsAtuais = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    timestamp: new Date().toISOString()
                };
                setStep('s2', 'done');
                setStep('s3', 'active');
                gerarProtocoloEDeclaracao();
            },
            (err) => {
                console.warn('geo error', err);
                mostrarBotaoGeo();
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function mostrarBotaoGeo() {
        geoBox.style.display = 'block';
        document.getElementById('requestGeoBtn').onclick = () => {
            solicitarGeolocalizacao(); // nova tentativa
        };
        // se já tinha step2 como active, mantém; mas se negou, colocamos como erro? melhor active até permitir
    }

    function gerarProtocoloEDeclaracao() {
        setTimeout(() => {
            // gera protocolo (randômico + timestamp)
            const protocolo = 'PROT-' + Date.now().toString(36) + '-' + Math.random().toString(36).substring(2,8).toUpperCase();
            const dataAtual = new Date().toLocaleString('pt-BR', { dateStyle: 'long', timeStyle: 'short' });

            // texto da declaração (3-4 linhas)
            const declaracao = `Eu, ${userNome}, portador do número de controle ${userId}, declaro que na data ${dataAtual}, acessei o sistema DomusFit (página restrita). A localização foi compartilhada: latitude ${coordsAtuais?.lat.toFixed(4) || '--'}, longitude ${coordsAtuais?.lng.toFixed(4) || '--'}. A autenticação ocorreu via dispositivo seguro.`;

            docText.innerText = declaracao;
            protocoloDisplay.innerText = `Protocolo: ${protocolo}`;
            declarationArea.style.display = 'block';
            setStep('s3', 'done');

            // SALVAR LOG NO FIREBASE (histórico de autenticação)
            const logRef = db.ref('logs_acesso').push();
            logRef.set({
                usuarioId: userId,
                nome: userNome,
                protocolo: protocolo,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                dataLegivel: dataAtual,
                localizacao: coordsAtuais,
                userAgent: navigator.userAgent
            });

            btnGo.style.display = 'block';
            btnBack.style.display = 'block';
        }, 1000);
    }

    function erroAutenticacao(msg) {
        setStep('s1', 'error');
        setStep('s2', 'error');
        setStep('s3', 'error');
        statusMsg.innerText = msg;
        statusMsg.style.display = 'block';
        btnBack.style.display = 'block';
    }

    // Voltar para o login
    btnBack.addEventListener('click', () => {
        timelineView.style.display = 'none';
        loginView.style.display = 'block';
        serieInput.value = '';
    });

    // Continuar para index2.html
    btnGo.addEventListener('click', () => {
        window.location.href = 'index2.html';
    });

    // Lembrar (checkbox) - já existe visualmente

</script>

<!-- INCLUSÃO DO ARQUIVO DE SEGURANÇA (mantido) -->
<script src="san7doc.acesso-seguro.js" defer></script>

</body>
</html>
