
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DomusFit | Apostas Copa 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f4f0 0%, #ffffff 100%);
            color: #1a1a1a;
            min-height: 100vh;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.9; }
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #1a5e2a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .header {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1a4d2a 0%, #2d6a4f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn {
            font-family: inherit;
            padding: 0.625rem 1.5rem;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .btn:hover::before {
            width: 200px;
            height: 200px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1a5e2a 0%, #2d6a4f 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(26, 94, 42, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 94, 42, 0.35);
        }

        .btn-outline {
            border: 1.5px solid #1a5e2a;
            background: transparent;
            color: #1a5e2a;
        }

        .btn-outline:hover {
            background: #1a5e2a;
            color: white;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #1a5e2a 0%, #2d6a4f 100%);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            color: white;
        }

        .btn-sm {
            padding: 0.375rem 1rem;
            font-size: 0.75rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 1.75rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08);
            transition: all 0.4s ease;
            border: 1px solid rgba(0,0,0,0.04);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.12);
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #1f2937;
            letter-spacing: -0.01em;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid #e8f0e8;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #4b5563;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 18px;
            font-family: inherit;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            background: #fafbfc;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1a5e2a;
            background: white;
            box-shadow: 0 0 0 3px rgba(26, 94, 42, 0.1);
        }

        .game-card {
            background: #fafbfc;
            border-radius: 22px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid #e5e7eb;
            transition: all 0.3s ease;
        }

        .game-card:hover {
            background: white;
            box-shadow: 0 8px 25px -8px rgba(0,0,0,0.1);
            transform: translateX(4px);
            border-color: #1a5e2a30;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid #e8f0e8;
        }

        .game-title {
            font-weight: 700;
            font-size: 1rem;
            color: #1f2937;
        }

        .badge {
            background: #1a5e2a;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .badge-warning {
            background: #d97706;
        }

        .badge-success {
            background: #1a5e2a;
        }

        .game-info {
            font-size: 0.75rem;
            color: #6b7280;
            margin-bottom: 0.5rem;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 580px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .modal-close {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: #f3f4f6;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            color: #6b7280;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #e5e7eb;
            transform: rotate(90deg);
        }

        .score-input-group {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            align-items: center;
            justify-content: center;
        }

        .score-input-group input {
            width: 120px;
            text-align: center;
            padding: 0.875rem;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 20px;
        }

        .bets-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .bet-item {
            background: #f9fafb;
            border-radius: 18px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .bet-item:hover {
            background: #f3f4f6;
        }

        .winner-card {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border-radius: 22px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid #1a5e2a30;
            animation: pulse 2s infinite;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #9ca3af;
            font-size: 0.875rem;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .stat-card {
            background: #f9fafb;
            border-radius: 18px;
            padding: 1rem;
            text-align: center;
        }

        .stat-number {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a5e2a;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 0.25rem;
        }

        hr {
            margin: 1rem 0;
            border: none;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">DomusFit | Apostas Copa 2026</div>
        </div>
    </div>

    <div class="container">
        <div class="admin-grid">
            <div>
                <div class="card">
                    <h2>Cadastrar Jogo</h2>
                    <div class="form-group">
                        <label>Data do Jogo</label>
                        <input type="date" id="gameDate">
                    </div>
                    <div class="form-group">
                        <label>Horario</label>
                        <input type="time" id="gameTime">
                    </div>
                    <div class="form-group">
                        <label>Adversario</label>
                        <input type="text" id="opponent" placeholder="Ex: Argentina">
                    </div>
                    <button class="btn btn-primary" onclick="createGame()">Cadastrar Jogo</button>
                </div>

                <div class="card" style="margin-top: 1.5rem;">
                    <h2>Registrar Aposta</h2>
                    <div class="form-group">
                        <label>Selecione o Jogo</label>
                        <select id="selectedGame">
                            <option value="">-- Selecione um jogo --</option>
                        </select>
                    </div>
                    <div id="betForm" style="display: none;">
                        <div class="form-group">
                            <label>Nome Completo</label>
                            <input type="text" id="betName" placeholder="Nome do apostador">
                        </div>
                        <div class="form-group">
                            <label>Telefone</label>
                            <input type="text" id="betPhone" placeholder="(11) 99999-9999" oninput="formatPhone(this)">
                        </div>
                        <div class="form-group">
                            <label>Placar Apostado</label>
                            <div class="score-input-group">
                                <input type="number" id="betBrasil" placeholder="Brasil" min="0">
                                <span style="font-weight: 700;">x</span>
                                <input type="number" id="betOpponent" placeholder="Adversario" min="0">
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="registerBet()">Registrar Aposta</button>
                    </div>
                </div>
            </div>

            <div>
                <div class="card">
                    <h2>Jogos Cadastrados</h2>
                    <div id="gamesList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVdKIP6jl-mLaqHNMW-IwK3pVkvhuSvSI",
            databaseURL: "https://san7-brasil-default-rtdb.firebaseio.com",
            projectId: "san7-brasil",
            authDomain: "san7-brasil.firebaseapp.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let games = [];

        function showLoading() {
            let loader = document.getElementById('globalLoader');
            if (!loader) {
                loader = document.createElement('div');
                loader.id = 'globalLoader';
                loader.className = 'loading-overlay';
                loader.innerHTML = '<div class="spinner"></div>';
                document.body.appendChild(loader);
            }
        }

        function hideLoading() {
            const loader = document.getElementById('globalLoader');
            if (loader) loader.remove();
        }

        function createConfetti() {
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti-particle';
                particle.style.position = 'fixed';
                particle.style.width = Math.random() * 8 + 4 + 'px';
                particle.style.height = Math.random() * 12 + 6 + 'px';
                particle.style.backgroundColor = `hsl(${Math.random() * 60 + 80}, 70%, 45%)`;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = '-10px';
                particle.style.borderRadius = '2px';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '2001';
                particle.style.animation = 'spin 3s ease-out forwards';
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 3000);
            }
        }

        function formatPhone(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length >= 2) {
                value = `(${value.slice(0, 2)}) ${value.slice(2)}`;
            }
            if (value.length > 10) {
                value = value.slice(0, 10) + '-' + value.slice(10);
            }
            input.value = value;
        }

        async function loadGames() {
            showLoading();
            const snapshot = await database.ref('games').once('value');
            games = [];
            snapshot.forEach(child => {
                games.push({ id: child.key, ...child.val() });
            });
            renderGamesList();
            renderGameSelect();
            hideLoading();
        }

        function renderGamesList() {
            const container = document.getElementById('gamesList');
            if (!games.length) {
                container.innerHTML = '<div class="empty-state">Nenhum jogo cadastrado</div>';
                return;
            }

            container.innerHTML = games.map(game => {
                const bets = game.bets ? Object.values(game.bets) : [];
                const winners = bets.filter(b => b.won === true);
                const hasResult = game.result;
                const drawDone = game.drawExecuted;
                
                return `
                    <div class="game-card">
                        <div class="game-header">
                            <span class="game-title">Brasil vs ${game.opponent}</span>
                            <span class="badge">${game.date} ${game.time}</span>
                        </div>
                        <div class="stat-grid" style="margin: 0.75rem 0;">
                            <div class="stat-card">
                                <div class="stat-number">${bets.length}</div>
                                <div class="stat-label">Apostas</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${winners.length}</div>
                                <div class="stat-label">Acertos</div>
                            </div>
                        </div>
                        <div class="game-info">
                            ${hasResult ? `Resultado: ${game.result.brasil} x ${game.result.opponent}` : 'Aguardando resultado'}
                        </div>
                        <div class="action-buttons">
                            ${!hasResult ? `
                                <button class="btn btn-outline btn-sm" onclick="openBetModal('${game.id}')">Ver Apostas</button>
                                <button class="btn btn-success btn-sm" onclick="openResultModal('${game.id}')">Definir Resultado</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteGame('${game.id}')">Excluir Jogo</button>
                            ` : `
                                <button class="btn btn-outline btn-sm" onclick="viewWinners('${game.id}')">Ver Vencedores</button>
                                ${!drawDone ? `<button class="btn btn-warning btn-sm" onclick="executeDraw('${game.id}')">Realizar Sorteio</button>` : '<span class="badge badge-success">Sorteio Realizado</span>'}
                                <button class="btn btn-danger btn-sm" onclick="deleteGame('${game.id}')">Excluir Jogo</button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderGameSelect() {
            const select = document.getElementById('selectedGame');
            select.innerHTML = '<option value="">-- Selecione um jogo --</option>' + 
                games.filter(g => !g.result).map(game => `<option value="${game.id}">Brasil vs ${game.opponent} (${game.date})</option>`).join('');
            
            select.onchange = () => {
                const betForm = document.getElementById('betForm');
                if (select.value) {
                    betForm.style.display = 'block';
                    const game = games.find(g => g.id === select.value);
                    if (game) document.getElementById('betOpponent').placeholder = game.opponent;
                } else {
                    betForm.style.display = 'none';
                }
            };
        }

        async function createGame() {
            const date = document.getElementById('gameDate').value;
            const time = document.getElementById('gameTime').value;
            const opponent = document.getElementById('opponent').value.trim();

            if (!date || !time || !opponent) {
                alert('Preencha todos os campos');
                return;
            }

            showLoading();
            await database.ref('games').push({
                date, time, opponent,
                createdAt: new Date().toISOString()
            });
            await loadGames();
            document.getElementById('gameDate').value = '';
            document.getElementById('gameTime').value = '';
            document.getElementById('opponent').value = '';
            hideLoading();
            createConfetti();
            alert('Jogo cadastrado com sucesso');
        }

        async function registerBet() {
            const gameId = document.getElementById('selectedGame').value;
            if (!gameId) {
                alert('Selecione um jogo primeiro');
                return;
            }

            const name = document.getElementById('betName').value.trim();
            const phone = document.getElementById('betPhone').value.trim();
            const brasilScore = parseInt(document.getElementById('betBrasil').value);
            const opponentScore = parseInt(document.getElementById('betOpponent').value);

            if (!name || !phone || isNaN(brasilScore) || isNaN(opponentScore)) {
                alert('Preencha todos os campos corretamente');
                return;
            }

            if (brasilScore < 0 || opponentScore < 0) {
                alert('Os placares nao podem ser negativos');
                return;
            }

            showLoading();
            const gameRef = database.ref(`games/${gameId}`);
            const gameSnapshot = await gameRef.once('value');
            const game = gameSnapshot.val();

            if (!game) {
                alert('Jogo nao encontrado');
                hideLoading();
                return;
            }

            if (game.result) {
                alert('Este jogo ja possui resultado definido');
                hideLoading();
                return;
            }

            const bets = game.bets || {};
            const existingBet = Object.values(bets).find(b => b.phone === phone);
            if (existingBet) {
                alert('Este telefone ja possui uma aposta para este jogo');
                hideLoading();
                return;
            }

            const betId = 'bet_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
            bets[betId] = {
                name, phone, brasilScore, opponentScore,
                createdAt: new Date().toISOString()
            };

            await gameRef.update({ bets });
            await loadGames();
            document.getElementById('betName').value = '';
            document.getElementById('betPhone').value = '';
            document.getElementById('betBrasil').value = '';
            document.getElementById('betOpponent').value = '';
            hideLoading();
            createConfetti();
            alert('Aposta registrada com sucesso');
        }

        async function openBetModal(gameId) {
            const game = games.find(g => g.id === gameId);
            if (!game) return;

            const bets = game.bets ? Object.values(game.bets) : [];
            
            const modalHtml = `
                <div class="modal-overlay" id="betsModal">
                    <div class="modal-content">
                        <button class="modal-close" onclick="closeModal()">×</button>
                        <h3 style="margin-bottom: 1rem;">Apostas - Brasil vs ${game.opponent}</h3>
                        <div class="bets-list">
                            ${bets.length === 0 ? '<div class="empty-state">Nenhuma aposta registrada</div>' : bets.map(bet => `
                                <div class="bet-item">
                                    <div>
                                        <div style="font-weight: 600;">${bet.name}</div>
                                        <div style="font-size: 0.7rem; color: #6b7280;">${bet.phone}</div>
                                    </div>
                                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                                        <div style="font-weight: 700; color: #1a5e2a;">${bet.brasilScore} x ${bet.opponentScore}</div>
                                        <button class="btn btn-danger btn-sm" onclick="deleteBet('${gameId}', '${bet.id}')">Excluir</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="action-buttons" style="margin-top: 1rem;">
                            <button class="btn btn-primary btn-sm" onclick="downloadPDF('${gameId}')">Download PDF</button>
                            <button class="btn btn-outline btn-sm" onclick="closeModal()">Fechar</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        window.deleteBet = async (gameId, betId) => {
            if (confirm('Excluir esta aposta permanentemente?')) {
                showLoading();
                const gameRef = database.ref(`games/${gameId}/bets/${betId}`);
                await gameRef.remove();
                await loadGames();
                hideLoading();
                closeModal();
                alert('Aposta excluida com sucesso');
            }
        };

        async function downloadPDF(gameId) {
            const game = games.find(g => g.id === gameId);
            if (!game) return;
            
            const bets = game.bets ? Object.values(game.bets) : [];
            let htmlContent = `
                <html>
                <head>
                    <style>
                        body { font-family: 'Inter', sans-serif; padding: 40px; }
                        h1 { color: #1a5e2a; }
                        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                        th { background: #1a5e2a; color: white; }
                    </style>
                </head>
                <body>
                    <h1>Lista de Apostas - DomusFit</h1>
                    <p><strong>Jogo:</strong> Brasil vs ${game.opponent}</p>
                    <p><strong>Data:</strong> ${game.date} as ${game.time}</p>
                    <p><strong>Total de Apostas:</strong> ${bets.length}</p>
                    <table>
                        <thead><tr><th>Nome</th><th>Telefone</th><th>Placar</th></tr></thead>
                        <tbody>
                            ${bets.map(bet => `<tr><td>${bet.name}</td><td>${bet.phone}</td><td>${bet.brasilScore} x ${bet.opponentScore}</td></tr>`).join('')}
                        </tbody>
                    </table>
                </body>
                </html>
            `;
            
            const blob = new Blob([htmlContent], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `apostas_${game.opponent}.pdf`;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function openResultModal(gameId) {
            const game = games.find(g => g.id === gameId);
            if (!game) return;

            const modalHtml = `
                <div class="modal-overlay" id="resultModal">
                    <div class="modal-content">
                        <button class="modal-close" onclick="closeModal()">×</button>
                        <h3 style="margin-bottom: 1rem;">Definir Resultado</h3>
                        <p style="margin-bottom: 1rem;">Brasil vs ${game.opponent}</p>
                        <div class="score-input-group">
                            <input type="number" id="resultBrasil" placeholder="Brasil" min="0">
                            <span style="font-weight: 700;">x</span>
                            <input type="number" id="resultOpponent" placeholder="${game.opponent}" min="0">
                        </div>
                        <button class="btn btn-primary" onclick="setGameResult('${gameId}')">Salvar Resultado</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        async function setGameResult(gameId) {
            const brasil = parseInt(document.getElementById('resultBrasil').value);
            const opponent = parseInt(document.getElementById('resultOpponent').value);

            if (isNaN(brasil) || isNaN(opponent)) {
                alert('Preencha o placar corretamente');
                return;
            }

            showLoading();
            const gameRef = database.ref(`games/${gameId}`);
            await gameRef.update({ result: { brasil, opponent } });
            
            const gameSnapshot = await gameRef.once('value');
            const game = gameSnapshot.val();
            const bets = game.bets || {};
            
            for (const [betId, bet] of Object.entries(bets)) {
                const won = (bet.brasilScore === brasil && bet.opponentScore === opponent);
                await gameRef.child(`bets/${betId}/won`).set(won);
            }
            
            closeModal();
            await loadGames();
            hideLoading();
            createConfetti();
            alert('Resultado definido com sucesso');
        }

        async function viewWinners(gameId) {
            const game = games.find(g => g.id === gameId);
            if (!game || !game.result) return;

            const bets = game.bets ? Object.values(game.bets) : [];
            const winners = bets.filter(b => b.won === true);
            
            const modalHtml = `
                <div class="modal-overlay" id="winnersModal">
                    <div class="modal-content">
                        <button class="modal-close" onclick="closeModal()">×</button>
                        <h3 style="margin-bottom: 1rem;">Vencedores</h3>
                        <p><strong>Resultado:</strong> ${game.result.brasil} x ${game.result.opponent}</p>
                        <p><strong>Total de acertos:</strong> ${winners.length}</p>
                        <div style="margin-top: 1.5rem;">
                            ${winners.length === 0 ? '<div class="empty-state">Nenhum vencedor</div>' : winners.map(winner => `
                                <div class="winner-card">
                                    <div style="font-weight: 700; font-size: 1rem;">${winner.name}</div>
                                    <div style="font-size: 0.75rem; color: #1a5e2a;">${winner.phone}</div>
                                    <div style="margin-top: 0.5rem;">Aposta: ${winner.brasilScore} x ${winner.opponentScore}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-primary btn-sm" onclick="downloadWinnersPDF('${gameId}')">Download PDF</button>
                            <button class="btn btn-outline btn-sm" onclick="closeModal()">Fechar</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        async function downloadWinnersPDF(gameId) {
            const game = games.find(g => g.id === gameId);
            if (!game || !game.result) return;
            
            const bets = game.bets ? Object.values(game.bets) : [];
            const winners = bets.filter(b => b.won === true);
            
            let htmlContent = `
                <html>
                <head>
                    <style>
                        body { font-family: 'Inter', sans-serif; padding: 40px; }
                        h1 { color: #1a5e2a; }
                        .winner { background: #e8f5e9; padding: 15px; margin: 10px 0; border-radius: 12px; }
                    </style>
                </head>
                <body>
                    <h1>Lista de Vencedores - DomusFit</h1>
                    <p><strong>Jogo:</strong> Brasil vs ${game.opponent}</p>
                    <p><strong>Resultado:</strong> ${game.result.brasil} x ${game.result.opponent}</p>
                    <p><strong>Total de Vencedores:</strong> ${winners.length}</p>
                    <hr>
                    ${winners.map(winner => `
                        <div class="winner">
                            <strong>${winner.name}</strong><br>
                            Telefone: ${winner.phone}<br>
                            Aposta: ${winner.brasilScore} x ${winner.opponentScore}
                        </div>
                    `).join('')}
                </body>
                </html>
            `;
            
            const blob = new Blob([htmlContent], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `vencedores_${game.opponent}.pdf`;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function executeDraw(gameId) {
            const game = games.find(g => g.id === gameId);
            if (!game || !game.result) {
                alert('Defina o resultado do jogo primeiro');
                return;
            }
            
            if (game.drawExecuted) {
                alert('Sorteio ja foi realizado para este jogo');
                return;
            }
            
            const bets = game.bets ? Object.values(game.bets) : [];
            const winners = bets.filter(b => b.won === true);
            
            if (winners.length === 0) {
                alert('Nao ha vencedores para realizar o sorteio');
                return;
            }
            
            if (winners.length === 1) {
                createConfetti();
                const modalHtml = `
                    <div class="modal-overlay" id="drawModal">
                        <div class="modal-content">
                            <button class="modal-close" onclick="closeModal()">×</button>
                            <h3 style="margin-bottom: 1rem;">Resultado do Sorteio</h3>
                            <div class="winner-card" style="text-align: center;">
                                <div style="font-size: 1.25rem; font-weight: 700;">Apenas um vencedor</div>
                                <div style="font-size: 1rem; margin-top: 1rem;">${winners[0].name}</div>
                                <div style="font-size: 0.875rem;">${winners[0].phone}</div>
                                <div style="margin-top: 0.5rem;">Aposta: ${winners[0].brasilScore} x ${winners[0].opponentScore}</div>
                            </div>
                            <div class="action-buttons" style="margin-top: 1rem;">
                                <button class="btn btn-primary btn-sm" onclick="closeModal(); downloadDrawPDF('${gameId}', ['${winners[0].name}'], ['${winners[0].phone}'])">Download PDF</button>
                                <button class="btn btn-outline btn-sm" onclick="closeModal()">Fechar</button>
                            </div>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                await database.ref(`games/${gameId}/drawExecuted`).set(true);
                await database.ref(`games/${gameId}/drawResult`).set([{ name: winners[0].name, phone: winners[0].phone }]);
                await loadGames();
                return;
            }
            
            const shuffled = [...winners];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            
            const drawn = shuffled.slice(0, 2);
            createConfetti();
            
            const modalHtml = `
                <div class="modal-overlay" id="drawModal">
                    <div class="modal-content">
                        <button class="modal-close" onclick="closeModal()">×</button>
                        <h3 style="margin-bottom: 1rem;">Resultado do Sorteio</h3>
                        <p style="margin-bottom: 1rem;">Jogo: Brasil vs ${game.opponent}</p>
                        <div class="winner-card" style="margin-bottom: 1rem;">
                            <div style="font-weight: 700;">Primeiro Sorteado</div>
                            <div style="font-size: 1rem; margin-top: 0.5rem;">${drawn[0].name}</div>
                            <div style="font-size: 0.875rem;">${drawn[0].phone}</div>
                        </div>
                        <div class="winner-card">
                            <div style="font-weight: 700;">Segundo Sorteado</div>
                            <div style="font-size: 1rem; margin-top: 0.5rem;">${drawn[1].name}</div>
                            <div style="font-size: 0.875rem;">${drawn[1].phone}</div>
                        </div>
                        <div class="action-buttons" style="margin-top: 1rem;">
                            <button class="btn btn-primary btn-sm" onclick="closeModal(); downloadDrawPDF('${gameId}', ['${drawn[0].name}', '${drawn[1].name}'], ['${drawn[0].phone}', '${drawn[1].phone}'])">Download PDF</button>
                            <button class="btn btn-outline btn-sm" onclick="closeModal()">Fechar</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            await database.ref(`games/${gameId}/drawExecuted`).set(true);
            await database.ref(`games/${gameId}/drawResult`).set(drawn.map(d => ({ name: d.name, phone: d.phone })));
            await loadGames();
        }

        async function downloadDrawPDF(gameId, names, phones) {
            const game = games.find(g => g.id === gameId);
            if (!game) return;
            
            let htmlContent = `
                <html>
                <head>
                    <style>
                        body { font-family: 'Inter', sans-serif; padding: 40px; }
                        h1 { color: #1a5e2a; }
                        .draw-box { background: #e8f5e9; padding: 25px; margin: 20px 0; border-radius: 16px; }
                    </style>
                </head>
                <body>
                    <h1>Resultado do Sorteio - DomusFit</h1>
                    <p><strong>Jogo:</strong> Brasil vs ${game.opponent}</p>
                    <p><strong>Data do Jogo:</strong> ${game.date} as ${game.time}</p>
                    <p><strong>Resultado Oficial:</strong> ${game.result.brasil} x ${game.result.opponent}</p>
                    <div class="draw-box">
                        <h2>Pessoas Sorteadas:</h2>
            `;
            
            if (names.length === 1) {
                htmlContent += `<p><strong>Vencedor Unico:</strong> ${names[0]} - ${phones[0]}</p>`;
            } else {
                htmlContent += `<p><strong>1º Sorteado:</strong> ${names[0]} - ${phones[0]}</p>`;
                htmlContent += `<p><strong>2º Sorteado:</strong> ${names[1]} - ${phones[1]}</p>`;
            }
            
            htmlContent += `
                    </div>
                    <p>Data do Sorteio: ${new Date().toLocaleString()}</p>
                </body>
                </html>
            `;
            
            const blob = new Blob([htmlContent], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sorteio_${game.opponent}.pdf`;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function deleteGame(gameId) {
            if (confirm('Excluir este jogo e todas as apostas relacionadas? Esta acao e irreversivel.')) {
                showLoading();
                await database.ref(`games/${gameId}`).remove();
                await loadGames();
                hideLoading();
                alert('Jogo excluido com sucesso');
            }
        }

        function closeModal() {
            const modals = document.querySelectorAll('.modal-overlay');
            modals.forEach(modal => modal.remove());
        }

        loadGames();
    </script>
</body>
</html>
